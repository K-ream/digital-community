<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 大事件 · 数字移民互助共同体</title>
<style>
  :root {
    --bg: #07090f;
    --bg2: #0d1120;
    --bg3: #111827;
    --card: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.06);
    --blue: #4fc3f7;
    --green: #81c784;
    --purple: #ce93d8;
    --orange: #ffb74d;
    --red: #ef5350;
    --red-orange: #ff8a65;
    --text: rgba(255,255,255,0.9);
    --text2: rgba(255,255,255,0.5);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(7,9,15,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px; height: 60px;
    transition: background 0.3s ease;
  }
  nav:hover { background: rgba(7,9,15,0.95); }
  @media (max-width: 768px) { nav { padding: 0 20px; } }
  .nav-logo {
    font-size: 18px; font-weight: 700; letter-spacing: 2px;
    background: linear-gradient(135deg, #4fc3f7, #ce93d8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-decoration: none;
  }
  .nav-links { display: flex; gap: 24px; align-items: center; }
  .nav-links a {
    color: var(--text2); text-decoration: none; font-size: 14px;
    transition: color 0.2s;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--blue); }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 32px 40px; text-align: center;
    color: var(--text2); font-size: 13px;
  }

  /* ── PARTICLES ── */
  .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .particle {
    position: absolute; border-radius: 50%;
    animation: float linear infinite;
  }
  @keyframes float {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(-10vh) scale(1); opacity: 0; }
  }

  /* ── PAGE HERO ── */
  .page-hero {
    padding: 100px 40px 40px;
    position: relative;
    display: flex; align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap; gap: 24px;
    max-width: 1100px; margin: 0 auto;
  }
  .page-hero-bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 70% 50% at 50% 20%, rgba(79,195,247,0.07) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 10% 70%, rgba(206,147,216,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 30% 30% at 90% 60%, rgba(255,183,77,0.05) 0%, transparent 60%);
  }
  .page-hero-left { position: relative; z-index: 1; }
  .page-title {
    font-size: 36px; font-weight: 800; letter-spacing: 2px;
    background: linear-gradient(135deg, #4fc3f7 30%, #ce93d8 70%);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .page-subtitle { color: var(--text2); font-size: 15px; letter-spacing: 1px; }
  .page-hero-right {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: flex-end; gap: 6px;
    text-align: right;
  }
  .meta-badge {
    display: inline-block;
    background: rgba(79,195,247,0.1);
    border: 1px solid rgba(79,195,247,0.25);
    border-radius: 20px; padding: 4px 16px;
    font-size: 13px; color: var(--blue);
  }
  .meta-badge.orange {
    background: rgba(255,183,77,0.1);
    border-color: rgba(255,183,77,0.25);
    color: var(--orange);
  }

  /* ── FILTER BAR ── */
  .filter-bar {
    max-width: 1100px; margin: 0 auto 36px;
    padding: 0 40px; position: relative; z-index: 2;
    display: flex; gap: 10px; flex-wrap: wrap;
  }
  .filter-btn {
    padding: 7px 18px; border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: var(--text2); font-size: 13px; cursor: pointer;
    transition: all 0.2s; font-family: inherit; white-space: nowrap;
    min-height: 36px;
  }
  .filter-btn:hover { border-color: rgba(79,195,247,0.4); color: var(--blue); }
  .filter-btn.active {
    background: rgba(79,195,247,0.15);
    border-color: rgba(79,195,247,0.5);
    color: var(--blue);
    box-shadow: 0 0 12px rgba(79,195,247,0.15);
  }

  /* ── TIMELINE ── */
  .timeline-wrap {
    max-width: 1100px; margin: 0 auto;
    padding: 0 40px 60px;
    position: relative; z-index: 1;
  }
  .timeline-line {
    position: absolute;
    left: calc(40px + 140px);
    top: 0; bottom: 0; width: 2px;
    background: linear-gradient(180deg, #4fc3f7 0%, #ce93d8 50%, #ffb74d 100%);
    opacity: 0.35; pointer-events: none;
  }
  .timeline-item { display: flex; gap: 32px; margin-bottom: 28px; position: relative; }

  .tl-date {
    flex: 0 0 140px; text-align: right;
    padding-top: 18px;
    font-size: 13px; color: var(--text2);
    font-variant-numeric: tabular-nums; line-height: 1.4;
  }
  .tl-date .day  { font-size: 22px; font-weight: 700; color: var(--text); display: block; }
  .tl-date .month { font-size: 12px; letter-spacing: 1px; }

  .tl-dot {
    flex: 0 0 14px; position: relative;
    display: flex; align-items: flex-start; padding-top: 22px;
  }
  .tl-dot::before {
    content: '';
    width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid var(--blue);
    background: var(--bg);
    box-shadow: 0 0 8px rgba(79,195,247,0.5);
    flex-shrink: 0;
  }
  .tl-dot.purple::before { border-color: var(--purple); box-shadow: 0 0 8px rgba(206,147,216,0.5); }
  .tl-dot.orange::before { border-color: var(--orange); box-shadow: 0 0 8px rgba(255,183,77,0.5); }
  .tl-dot.red::before    { border-color: var(--red);    box-shadow: 0 0 8px rgba(239,83,80,0.5); }
  .tl-dot.green::before  { border-color: var(--green);  box-shadow: 0 0 8px rgba(129,199,132,0.5); }

  .tl-card {
    flex: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px; padding: 18px 22px;
    transition: border-color 0.2s, background 0.2s, transform 0.2s;
  }
  .tl-card:hover {
    border-color: rgba(79,195,247,0.2);
    background: rgba(255,255,255,0.055);
    transform: translateX(4px);
  }
  .tl-card-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .cat-tag {
    font-size: 11px; padding: 2px 10px; border-radius: 10px; font-weight: 600; letter-spacing: 0.5px;
  }
  .cat-model    { background: rgba(79,195,247,0.15);  color: var(--blue);   border: 1px solid rgba(79,195,247,0.25); }
  .cat-policy   { background: rgba(206,147,216,0.15); color: var(--purple); border: 1px solid rgba(206,147,216,0.25); }
  .cat-industry { background: rgba(255,183,77,0.15);  color: var(--orange); border: 1px solid rgba(255,183,77,0.25); }
  .cat-safety   { background: rgba(239,83,80,0.15);   color: var(--red);    border: 1px solid rgba(239,83,80,0.25); }
  .cat-china    { background: rgba(129,199,132,0.15); color: var(--green);  border: 1px solid rgba(129,199,132,0.25); }
  .importance   { font-size: 13px; margin-left: auto; white-space: nowrap; }

  .tl-card-title { font-size: 17px; font-weight: 700; color: var(--text); margin-bottom: 8px; line-height: 1.4; }
  .tl-card-desc  { font-size: 13px; color: var(--text2); line-height: 1.7; margin-bottom: 10px; }
  .tl-card-impact {
    font-size: 12px; padding: 6px 12px; border-radius: 8px;
    background: rgba(79,195,247,0.07);
    border-left: 3px solid var(--blue);
    color: rgba(79,195,247,0.85); line-height: 1.5;
  }
  .tl-card-impact.purple { background: rgba(206,147,216,0.07); border-color: var(--purple); color: rgba(206,147,216,0.85); }
  .tl-card-impact.orange { background: rgba(255,183,77,0.07);  border-color: var(--orange); color: rgba(255,183,77,0.85); }
  .tl-card-impact.red    { background: rgba(239,83,80,0.07);   border-color: var(--red);    color: rgba(239,83,80,0.85); }
  .tl-card-impact.green  { background: rgba(129,199,132,0.07); border-color: var(--green);  color: rgba(129,199,132,0.85); }

  /* ── LOADING ── */
  .loading-state {
    text-align: center; padding: 60px 20px;
    color: var(--text2); font-size: 15px;
  }
  .loading-state span { font-size: 32px; display: block; margin-bottom: 12px; animation: spin 1.2s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--text2); font-size: 15px; }
  .empty-state span { font-size: 40px; display: block; margin-bottom: 12px; }

  @media (max-width: 700px) {
    .page-hero  { padding: 80px 16px 24px; }
    .filter-bar { padding: 0 16px; }
    .timeline-wrap { padding: 0 16px 40px; }
    .timeline-line { left: calc(16px + 60px); }
    .tl-date { flex: 0 0 60px; font-size: 12px; }
    .tl-date .day { font-size: 18px; }
    .page-title { font-size: 24px; }
    .tl-card { padding: 14px 16px; }
    .tl-card-title { font-size: 15px; }
    .tl-card-desc  { font-size: 12px; }
  }
  @media (max-width: 480px) {
    .timeline-line { left: calc(16px + 50px); }
    .tl-date { flex: 0 0 50px; }
    .tl-dot  { flex: 0 0 12px; }
    .tl-dot::before { width: 12px; height: 12px; }
    .particles { display: none; }
  }
</style>
</head>
<body>

<div class="particles" id="particles"></div>
<div class="page-hero-bg"></div>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="index.html">🌐 数字移民共同体</a>
  <div class="nav-links">
    <a href="index.html" class="active">🌐 AI大事件</a>
  </div>
</nav>

<!-- PAGE HERO -->
<div class="page-hero">
  <div class="page-hero-left">
    <h1 class="page-title">🌐 AI 大事件</h1>
    <p class="page-subtitle">全球人工智能重大事件追踪 · 实时更新</p>
  </div>
  <div class="page-hero-right">
    <span class="meta-badge" id="totalCount">加载中...</span>
    <span class="meta-badge orange" id="latestDate">最近更新：加载中...</span>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filter-bar">
  <button class="filter-btn active" data-cat="all">全部</button>
  <button class="filter-btn" data-cat="model">🧠 模型突破</button>
  <button class="filter-btn" data-cat="policy">🏛️ 政策法规</button>
  <button class="filter-btn" data-cat="industry">💼 产业动态</button>
  <button class="filter-btn" data-cat="safety">⚠️ 安全伦理</button>
  <button class="filter-btn" data-cat="china">🌏 中国AI</button>
</div>

<!-- TIMELINE -->
<div class="timeline-wrap" id="timelineWrap">
  <div class="timeline-line"></div>
  <div id="timelineContainer">
    <div class="loading-state"><span>⏳</span>正在加载事件数据...</div>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <p>🌐 数字移民互助共同体 · 贡献越多，连接越广，节点越亮</p>
  <p style="margin-top:8px;font-size:12px;opacity:0.4;">这是一个构想中的项目原型 · Built with 🦞</p>
</footer>

<script>
// ── 当前筛选状态 ──
let currentFilter = 'all';
let allEvents = [];

// ── 渲染时间线 ──
function renderTimeline(filter) {
  currentFilter = filter;
  const container = document.getElementById('timelineContainer');
  const filtered = filter === 'all' ? allEvents : allEvents.filter(e => e.cat === filter);

  if (filtered.length === 0) {
    container.innerHTML = '<div class="empty-state"><span>🔍</span>暂无该分类事件</div>';
    return;
  }

  container.innerHTML = filtered.map(e => {
    const impactClass = e.impactClass ? ' ' + e.impactClass : '';
    const dotClass = e.dotColor !== 'blue' ? ' ' + e.dotColor : '';
    return [
      '<div class="timeline-item" data-cat="' + e.cat + '">',
      '  <div class="tl-date">',
      '    <span class="day">' + parseInt(e.dateDay, 10) + '</span>',
      '    <span class="month">' + e.dateMonth + '</span>',
      '  </div>',
      '  <div class="tl-dot' + dotClass + '"></div>',
      '  <div class="tl-card">',
      '    <div class="tl-card-top">',
      '      <span class="cat-tag ' + e.catClass + '">' + e.catLabel + '</span>',
      '      <span class="importance">' + e.importance + '</span>',
      '    </div>',
      '    <div class="tl-card-title">' + e.title + '</div>',
      '    <div class="tl-card-desc">' + e.desc + '</div>',
      '    <div class="tl-card-impact' + impactClass + '">' + e.impact + '</div>',
      '  </div>',
      '</div>'
    ].join('\n');
  }).join('\n');
}

// ── 更新 Hero 统计 ──
function updateStats() {
  document.getElementById('totalCount').textContent = '共 ' + allEvents.length + ' 条事件';
  const sorted = allEvents.slice().sort(function(a, b) {
    return new Date(b.date) - new Date(a.date);
  });
  if (sorted.length > 0) {
    const latest = sorted[0];
    const day = parseInt(latest.dateDay, 10);
    document.getElementById('latestDate').textContent = '最近更新：' + latest.dateMonth + day + '日';
  }
}

// ── 筛选按钮 ──
document.querySelectorAll('.filter-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    renderTimeline(btn.dataset.cat);
  });
});

// ── 粒子效果 ──
(function() {
  var container = document.getElementById('particles');
  var colors = ['#4fc3f7','#ce93d8','#ffb74d','#81c784'];
  for (var i = 0; i < 18; i++) {
    var p = document.createElement('div');
    p.className = 'particle';
    var size = Math.random() * 3 + 1;
    p.style.cssText = 'width:' + size + 'px;height:' + size + 'px;left:' + (Math.random()*100) + '%;'
      + 'background:' + colors[Math.floor(Math.random()*colors.length)] + ';'
      + 'animation-duration:' + (Math.random()*20+15) + 's;'
      + 'animation-delay:' + (Math.random()*10) + 's;opacity:0.6;';
    container.appendChild(p);
  }
})();

// ── 加载数据 ──
fetch('events.json')
  .then(function(res) {
    if (!res.ok) throw new Error('HTTP ' + res.status);
    return res.json();
  })
  .then(function(data) {
    allEvents = data;
    updateStats();
    renderTimeline(currentFilter);
  })
  .catch(function(err) {
    document.getElementById('timelineContainer').innerHTML =
      '<div class="empty-state"><span>⚠️</span>事件数据加载失败：' + err.message + '</div>';
    console.error('Failed to load events.json:', err);
  });
</script>
</body>
</html>
