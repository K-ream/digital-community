<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>赛博城市 · 数字移民互助共同体</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a1a;
    color: #e0e0ff;
    font-family: 'Courier New', monospace;
    overflow-x: hidden;
  }

  /* ── NAV ── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(7,9,15,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px; height: 60px;
  }
  .nav-logo {
    font-size: 18px; font-weight: 700; letter-spacing: 2px;
    background: linear-gradient(135deg, #4fc3f7, #ce93d8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-decoration: none;
  }
  .nav-links { display: flex; gap: 24px; align-items: center; }
  .nav-links a {
    color: rgba(255,255,255,0.5); text-decoration: none; font-size: 14px;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: #4fc3f7; }
  .nav-links a.active { color: #4fc3f7; }
  .nav-score {
    display: flex; align-items: center; gap: 16px;
  }
  .score-badge {
    background: rgba(255,183,77,0.12);
    border: 1px solid rgba(255,183,77,0.3);
    border-radius: 20px; padding: 6px 16px;
    font-size: 14px; color: #ffb74d;
    display: flex; align-items: center; gap: 6px;
  }
  .music-btn {
    background: rgba(206,147,216,0.12);
    border: 1px solid rgba(206,147,216,0.3);
    color: #ce93d8; border-radius: 20px;
    padding: 6px 14px; cursor: pointer; font-size: 14px;
    transition: all 0.2s;
  }
  .music-btn:hover { background: rgba(206,147,216,0.25); }

  /* ── GAME WRAPPER ── */
  #game-wrapper {
    margin-top: 60px;
    position: relative;
    width: 100%; height: calc(100vh - 60px);
    overflow: hidden;
  }
  #game-canvas {
    display: block;
    background: #0a0a1a;
    cursor: none;
  }

  /* ── HUD ── */
  #hud {
    position: absolute; top: 12px; left: 12px;
    pointer-events: none; z-index: 10;
  }
  .hud-tip {
    background: rgba(10,10,30,0.75);
    border: 1px solid #4fc3f730;
    border-radius: 8px; padding: 6px 12px;
    font-size: 11px; color: #6080a0;
    backdrop-filter: blur(4px);
  }

  /* ── DIALOG BOX ── */
  #dialog-box {
    position: absolute;
    bottom: 100px; left: 50%; transform: translateX(-50%);
    width: min(520px, 90vw);
    background: rgba(8,12,30,0.95);
    border: 1px solid #4fc3f760;
    border-radius: 14px; padding: 16px 20px;
    backdrop-filter: blur(16px);
    box-shadow: 0 0 30px #4fc3f730, 0 0 60px #0a0a1a;
    display: none; z-index: 20;
    animation: dialogIn 0.2s ease-out;
  }
  @keyframes dialogIn {
    from { opacity:0; transform:translateX(-50%) translateY(10px); }
    to   { opacity:1; transform:translateX(-50%) translateY(0); }
  }
  .dialog-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 8px;
  }
  .dialog-avatar {
    font-size: 28px; line-height: 1;
    filter: drop-shadow(0 0 6px currentColor);
  }
  .dialog-name { font-size: 15px; font-weight: 700; color: #4fc3f7; }
  .dialog-role { font-size: 11px; color: #ce93d8; margin-top: 1px; }
  .dialog-text {
    font-size: 13px; line-height: 1.7; color: #c8d8f0;
    border-top: 1px solid #4fc3f720; padding-top: 10px;
  }
  .dialog-close {
    position: absolute; top: 10px; right: 14px;
    color: #4fc3f750; font-size: 18px; cursor: pointer;
    pointer-events: all;
  }
  .dialog-score-badge {
    display: inline-block; margin-top: 8px;
    background: #ffb74d20; border: 1px solid #ffb74d60;
    color: #ffb74d; border-radius: 12px;
    padding: 2px 10px; font-size: 11px;
  }

  /* ── ENTER NOTICE ── */
  #enter-notice {
    position: absolute; bottom: 80px; left: 50%;
    transform: translateX(-50%);
    background: rgba(79,195,247,0.15);
    border: 1px solid #4fc3f760;
    color: #4fc3f7; border-radius: 20px;
    padding: 6px 20px; font-size: 13px;
    display: none; z-index: 15;
    animation: pulse 1s ease-in-out infinite;
    white-space: nowrap;
    pointer-events: none;
  }
  @keyframes pulse {
    0%,100% { opacity:0.7; } 50% { opacity:1; }
  }

  /* ── MOBILE CONTROLS ── */
  #mobile-controls {
    position: absolute; bottom: 20px; left: 0; right: 0;
    display: none;
    justify-content: space-between;
    padding: 0 24px;
    z-index: 25;
  }
  .ctrl-group { display: flex; gap: 10px; }
  .ctrl-btn {
    width: 54px; height: 54px;
    background: rgba(79,195,247,0.12);
    border: 2px solid #4fc3f760;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; color: #4fc3f7;
    user-select: none; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s;
    touch-action: none;
  }
  .ctrl-btn:active, .ctrl-btn.pressed {
    background: rgba(79,195,247,0.3);
    border-color: #4fc3f7;
  }
  .ctrl-btn.interact-btn {
    background: rgba(206,147,216,0.12);
    border-color: #ce93d860;
    color: #ce93d8;
  }
  .ctrl-btn.interact-btn:active {
    background: rgba(206,147,216,0.3);
  }

  /* ── SCORE POPUP ── */
  .score-popup {
    position: absolute;
    font-size: 18px; font-weight: 700;
    color: #ffb74d;
    text-shadow: 0 0 10px #ffb74d;
    pointer-events: none;
    z-index: 30;
    animation: scoreFloat 1.2s ease-out forwards;
  }
  @keyframes scoreFloat {
    0%   { opacity:1; transform:translateY(0); }
    100% { opacity:0; transform:translateY(-60px); }
  }

  @media (max-width: 768px) {
    nav { padding: 0 20px; }
    .nav-links { gap: 12px; }
    .nav-links a { font-size: 13px; }
    .nav-score { gap: 12px; }
    .score-badge, .music-btn { padding: 5px 12px; font-size: 13px; }
    .score-badge { font-size: 12px; }
    #mobile-controls { display: flex; }
  }
  @media (pointer: coarse) {
    #mobile-controls { display: flex; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="index.html">🌐 数字移民共同体</a>
  <div class="nav-links">
    <a href="index.html">首页</a>
    <a href="projects.html">项目池</a>
    <a href="dashboard.html">仪表盘</a>
    <a href="leaderboard.html">排行榜</a>
    <a href="ai-events.html">🌐 AI大事件</a>
    <a href="exchange.html">兑换</a>
    <a href="governance.html">治理</a>
    <a href="manifesto.html">宣言</a>
    <a href="city.html" class="active">🎮 城市</a>
  </div>
  <div class="nav-score">
    <div class="score-badge">⭐ <span id="nav-score">0</span> 分</div>
    <button class="music-btn" id="music-btn" onclick="toggleMusic()">🎵 音乐</button>
  </div>
</nav>

<!-- GAME -->
<div id="game-wrapper">
  <canvas id="game-canvas"></canvas>

  <!-- HUD -->
  <div id="hud">
    <div class="hud-tip">← → 移动 &nbsp;|&nbsp; 空格/E 互动 &nbsp;|&nbsp; 靠近建筑/NPC触发</div>
  </div>

  <!-- Dialog -->
  <div id="dialog-box">
    <span class="dialog-close" onclick="closeDialog()">✕</span>
    <div class="dialog-header">
      <div class="dialog-avatar" id="dlg-avatar"></div>
      <div>
        <div class="dialog-name" id="dlg-name"></div>
        <div class="dialog-role" id="dlg-role"></div>
      </div>
    </div>
    <div class="dialog-text" id="dlg-text"></div>
    <div class="dialog-score-badge" id="dlg-score"></div>
  </div>

  <!-- Enter notice -->
  <div id="enter-notice" id="enter-notice">⏎ 按 空格/E 进入</div>

  <!-- Mobile Controls -->
  <div id="mobile-controls">
    <div class="ctrl-group">
      <div class="ctrl-btn" id="btn-left">◀</div>
      <div class="ctrl-btn" id="btn-right">▶</div>
    </div>
    <div class="ctrl-group">
      <div class="ctrl-btn interact-btn" id="btn-interact">⚡</div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// GAME ENGINE
// ═══════════════════════════════════════════════════

const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const wrapper = document.getElementById('game-wrapper');

let W, H;
function resize() {
  W = canvas.width  = wrapper.clientWidth;
  H = canvas.height = wrapper.clientHeight;
}
resize();
window.addEventListener('resize', resize);

// ── GAME STATE ──
let score = 0;
let musicOn = false;
let dialogOpen = false;
let dialogTimer = null;
let lastInteractId = null;
let interactCooldown = 0;

// ── CAMERA ──
let cameraX = 0;
const WORLD_W = 3200;

// ── PLAYER ──
const player = {
  x: 400, y: 0,
  vy: 0, vx: 0,
  width: 28, height: 48,
  onGround: false,
  facing: 1,      // 1=right, -1=left
  frame: 0,
  frameTimer: 0,
  color: '#4fc3f7',
  visited: new Set()
};

// ── KEYS ──
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['Space','KeyE'].includes(e.code)) { e.preventDefault(); tryInteract(); }
  if (['ArrowLeft','ArrowRight','ArrowUp','Space'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup',  e => { keys[e.code] = false; });

// ── TOUCH / MOBILE ──
function setupMobileBtn(id, key) {
  const btn = document.getElementById(id);
  if (!btn) return;
  btn.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = true; btn.classList.add('pressed'); }, {passive:false});
  btn.addEventListener('touchend',   e => { e.preventDefault(); keys[key] = false; btn.classList.remove('pressed'); }, {passive:false});
  btn.addEventListener('mousedown',  e => { keys[key] = true; btn.classList.add('pressed'); });
  btn.addEventListener('mouseup',    e => { keys[key] = false; btn.classList.remove('pressed'); });
}
setupMobileBtn('btn-left',  'ArrowLeft');
setupMobileBtn('btn-right', 'ArrowRight');
document.getElementById('btn-interact').addEventListener('touchstart', e => { e.preventDefault(); tryInteract(); }, {passive:false});
document.getElementById('btn-interact').addEventListener('click', () => tryInteract());

// ── GROUND LEVEL ──
function groundY() { return H - 120; }

// ── BUILDINGS ──
const buildings = [
  {
    id: 'community', x: 80,   width: 180, label: '🏛️ 社区中心',
    color: '#4fc3f7', darkColor: '#1a3a4a', height: 220,
    url: 'index.html', sign: '社区中心', emoji: '🏛️',
    desc: '数字移民共同体总部',
    visitScore: 30
  },
  {
    id: 'projects',  x: 420,  width: 200, label: '🏗️ 项目大楼',
    color: '#ce93d8', darkColor: '#2a1a3a', height: 280,
    url: 'projects.html', sign: '项目大楼', emoji: '🏗️',
    desc: '孵化创新项目的地方',
    visitScore: 25
  },
  {
    id: 'datacenter', x: 780,  width: 220, label: '📊 数据中心',
    color: '#ffb74d', darkColor: '#3a2a10', height: 260,
    url: 'dashboard.html', sign: '数据中心', emoji: '📊',
    desc: '实时监控链上数据',
    visitScore: 20
  },
  {
    id: 'glory',     x: 1150, width: 200, label: '🏆 荣耀殿堂',
    color: '#ffd54f', darkColor: '#3a3010', height: 300,
    url: 'leaderboard.html', sign: '荣耀殿堂', emoji: '🏆',
    desc: '顶级贡献者的圣地',
    visitScore: 25
  },
  {
    id: 'council',   x: 1520, width: 210, label: '🗳️ 议会大厅',
    color: '#80cbc4', darkColor: '#0f2a28', height: 250,
    url: 'governance.html', sign: '议会大厅', emoji: '🗳️',
    desc: '社区治理决策中心',
    visitScore: 25
  },
  {
    id: 'exchange',  x: 1900, width: 200, label: '💱 兑换市场',
    color: '#a5d6a7', darkColor: '#102010', height: 240,
    url: 'exchange.html', sign: '兑换市场', emoji: '💱',
    desc: '代币兑换与流通',
    visitScore: 20
  },
];

// ── NPC ──
const npcs = [
  {
    id: 'alice', x: 310, name: 'Alice.eth',
    emoji: '👩‍💻', role: '全栈开发者',
    color: '#4fc3f7',
    dialogs: [
      "刚把我的 DeFi 聚合器项目提交到项目池了！🚀 大家快去投票支持一下~",
      "链上数据不会骗人，数据中心的面板显示本月交易量暴涨 300%！",
      "我在用 TypeScript 重写整个前端，性能提升明显，有兴趣一起来 PR 吗？"
    ]
  },
  {
    id: 'bob', x: 700, name: 'Bob_DAO',
    emoji: '🧑‍⚖️', role: '治理委员',
    color: '#ce93d8',
    dialogs: [
      "本周有三个重要提案在议会大厅投票，别忘了行使你的治理权！🗳️",
      "上次提案通过后，社区金库增加了 50K 代币，这就是集体智慧的力量。",
      "治理不是游戏，每一票都代表着社区的未来方向……好吧，其实有点像游戏。"
    ]
  },
  {
    id: 'carol', x: 1080, name: 'Carol💎',
    emoji: '🦄', role: '排行榜第一名',
    color: '#ffd54f',
    dialogs: [
      "连续三个月蝉联排行榜第一，我的秘诀是——每天提交代码、每天参与治理！",
      "荣耀殿堂里有我的专属奖杯吗？哈哈，其实能帮到大家才是真正的荣耀。",
      "积分不是目的，但看到数字增长确实很爽，你不觉得吗？👀"
    ]
  },
  {
    id: 'dave', x: 1450, name: 'Dave_节点',
    emoji: '🤖', role: 'Node 运营商',
    color: '#80cbc4',
    dialogs: [
      "我运营着 7 个验证节点，今天全部绿灯在线！服务器永不宕机就是我的人生目标。",
      "数据包在虚空中飞行，经过我的节点……感觉自己是城市的血脉，浪漫吧？",
      "听说有人想攻击网络？醒醒，我们有 51% 的节点在线，来了也白费力气。"
    ]
  },
  {
    id: 'eva', x: 1850, name: 'Eva_艺术家',
    emoji: '🎨', role: 'NFT 创作者',
    color: '#f48fb1',
    dialogs: [
      "我刚发布了一套赛博朋克移民系列 NFT，每一张都是这座城市的灵魂片段。",
      "代币换艺术，艺术换灵感，灵感换代币……这是数字文明的永动机！",
      "你知道吗，我最新作品的灵感就来自这条街——就是你现在走的这条。"
    ]
  },
  {
    id: 'frank', x: 2300, name: 'Frank老矿工',
    emoji: '⛏️', role: '早期贡献者',
    color: '#ffb74d',
    dialogs: [
      "2020 年我就加入了，那时候这里还只是一片空地……感慨万千啊。",
      "年轻人，好好用兑换市场，代币要流通才有价值，别光囤着！",
      "我挖的第一个区块，见证了这个社区从无到有，这比任何财富都珍贵。"
    ]
  },
  {
    id: 'grace', x: 2700, name: 'Grace_研究员',
    emoji: '🔬', role: '链上数据分析师',
    color: '#b39ddb',
    dialogs: [
      "根据我的分析，活跃用户每季度增长 40%，这个增长曲线简直教科书级别！",
      "数据说：每天早上 9 点是社区最活跃的时段，大家都在上班偷偷用手机……",
      "我在写一篇关于 DAO 治理效率的论文，能采访一下你吗？就一分钟！"
    ]
  },
];

// ── PARTICLES (data stream) ──
const particles = [];
for (let i = 0; i < 80; i++) {
  particles.push({
    x: Math.random() * WORLD_W,
    y: Math.random() * 300,
    vx: (Math.random() - 0.3) * 0.8,
    vy: Math.random() * 0.5 + 0.2,
    size: Math.random() * 2 + 0.5,
    alpha: Math.random() * 0.6 + 0.2,
    color: ['#4fc3f7','#ce93d8','#ffb74d','#80cbc4'][Math.floor(Math.random()*4)],
    char: '01アイウエオabcdef'.split('')[Math.floor(Math.random()*14)]
  });
}

// ── SKYLINE ──
const skyline = [];
for (let i = 0; i < 50; i++) {
  skyline.push({
    x: i * 70 + Math.random() * 30,
    h: 80 + Math.random() * 200,
    w: 30 + Math.random() * 50,
    windows: []
  });
  const b = skyline[skyline.length-1];
  for (let j = 0; j < 12; j++) {
    b.windows.push({
      x: Math.random() * (b.w - 8),
      y: Math.random() * (b.h - 8),
      on: Math.random() > 0.4
    });
  }
}

// ── SCORE POPUPS ──
const scorePopups = [];
function addScorePopup(x, y, val) {
  const el = document.createElement('div');
  el.className = 'score-popup';
  el.textContent = '+' + val;
  el.style.left = (x - cameraX - 20) + 'px';
  el.style.top  = (y - 30) + 'px';
  wrapper.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

// ── UPDATE SCORE ──
function addScore(val, wx, wy) {
  score += val;
  document.getElementById('nav-score').textContent = score;
  if (wx !== undefined) addScorePopup(wx, wy, val);
}

// ── DIALOG ──
const dialogBox  = document.getElementById('dialog-box');
const enterNotice = document.getElementById('enter-notice');

function showDialog(entity, scoreVal) {
  clearTimeout(dialogTimer);
  const isNpc = entity.emoji !== undefined && entity.dialogs !== undefined;
  document.getElementById('dlg-avatar').textContent = entity.emoji;
  document.getElementById('dlg-name').textContent   = entity.name || entity.sign;
  document.getElementById('dlg-role').textContent   = entity.role || entity.desc || '';

  let text;
  if (isNpc) {
    const idx = Math.floor(Math.random() * entity.dialogs.length);
    text = entity.dialogs[idx];
  } else {
    text = `欢迎来到 <b>${entity.sign}</b>！<br>即将跳转到对应页面……`;
  }
  document.getElementById('dlg-text').innerHTML = text;
  document.getElementById('dlg-score').textContent = scoreVal > 0 ? `+${scoreVal} 积分` : '';
  dialogBox.style.display = 'block';
  dialogOpen = true;
  enterNotice.style.display = 'none';

  dialogTimer = setTimeout(() => closeDialog(), 5000);
}

function closeDialog() {
  dialogBox.style.display = 'none';
  dialogOpen = false;
  clearTimeout(dialogTimer);
}

window.closeDialog = closeDialog;

// ── INTERACT ──
function tryInteract() {
  if (interactCooldown > 0) return;
  interactCooldown = 60;

  const px = player.x + player.width / 2;
  const REACH = 80;

  // Check NPC
  for (const npc of npcs) {
    const nx = npc.x + 16;
    if (Math.abs(px - nx) < REACH) {
      const key = 'npc_' + npc.id;
      const scoreVal = player.visited.has(key) ? 5 : 15;
      if (!player.visited.has(key)) player.visited.add(key);
      addScore(scoreVal, npc.x, groundY() - 60);
      showDialog(npc, scoreVal);
      lastInteractId = key;
      return;
    }
  }

  // Check Building
  for (const b of buildings) {
    const bCx = b.x + b.width / 2;
    if (Math.abs(px - bCx) < b.width / 2 + 30) {
      const key = 'bld_' + b.id;
      const scoreVal = player.visited.has(key) ? 5 : b.visitScore;
      if (!player.visited.has(key)) player.visited.add(key);
      addScore(scoreVal, bCx, groundY() - b.height);
      showDialog({ emoji: b.emoji, name: b.label, sign: b.sign, desc: b.desc }, scoreVal);
      lastInteractId = key;
      setTimeout(() => { window.location.href = b.url; }, 1600);
      return;
    }
  }
}

// ── PHYSICS ──
const GRAVITY = 0.5;
const MOVE_SPEED = 3.5;
const JUMP_VEL = -10;

function updatePlayer() {
  if (interactCooldown > 0) interactCooldown--;

  // Horizontal
  let moving = false;
  if (keys['ArrowLeft']  || keys['KeyA']) { player.vx = -MOVE_SPEED; player.facing = -1; moving = true; }
  else if (keys['ArrowRight'] || keys['KeyD']) { player.vx = MOVE_SPEED; player.facing = 1; moving = true; }
  else { player.vx *= 0.7; }

  player.x += player.vx;
  player.x = Math.max(0, Math.min(WORLD_W - player.width, player.x));

  // Gravity
  player.vy += GRAVITY;
  player.y += player.vy;

  const gy = groundY() - player.height;
  if (player.y >= gy) {
    player.y = gy;
    player.vy = 0;
    player.onGround = true;
  } else {
    player.onGround = false;
  }

  // Animation frame
  if (moving) {
    player.frameTimer++;
    if (player.frameTimer > 8) { player.frame = (player.frame + 1) % 4; player.frameTimer = 0; }
  } else {
    player.frame = 0;
  }

  // Camera follow (smooth)
  const targetCam = player.x + player.width/2 - W/2;
  cameraX += (Math.max(0, Math.min(WORLD_W - W, targetCam)) - cameraX) * 0.1;

  // Enter notice
  updateEnterNotice();
}

function updateEnterNotice() {
  const px = player.x + player.width / 2;
  const REACH = 90;
  let near = null;

  for (const npc of npcs) {
    if (Math.abs(px - (npc.x+16)) < REACH) { near = npc.name; break; }
  }
  if (!near) {
    for (const b of buildings) {
      if (Math.abs(px - (b.x + b.width/2)) < b.width/2 + 30) { near = b.sign; break; }
    }
  }

  if (near && !dialogOpen) {
    enterNotice.style.display = 'block';
    enterNotice.textContent = `⏎ 按 空格/E 与「${near}」互动`;
  } else if (!near) {
    enterNotice.style.display = 'none';
  }
}

// ── DRAW ──
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H * 0.6);
  skyGrad.addColorStop(0,   '#020214');
  skyGrad.addColorStop(0.5, '#08082a');
  skyGrad.addColorStop(1,   '#0d0d22');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  ctx.save();
  for (let i = 0; i < 120; i++) {
    const sx = ((i * 317 + 13) % WORLD_W - cameraX) % W;
    const sy = (i * 137 + 7) % (H * 0.5);
    const alpha = 0.3 + 0.5 * Math.sin(Date.now() * 0.001 + i);
    ctx.fillStyle = `rgba(200,210,255,${alpha})`;
    ctx.fillRect(((sx % W) + W) % W, sy, 1.5, 1.5);
  }
  ctx.restore();

  // Distant skyline
  drawSkyline();

  // Particles (data stream)
  drawParticles();

  // Ground
  drawGround();

  // Buildings
  for (const b of buildings) drawBuilding(b);

  // NPCs
  for (const npc of npcs) drawNpc(npc);

  // Player
  drawPlayer();
}

function drawSkyline() {
  for (const b of skyline) {
    const bx = b.x - cameraX * 0.3; // parallax
    if (bx + b.w < 0 || bx > W) continue;
    ctx.fillStyle = '#0c0c20';
    ctx.fillRect(bx, H * 0.55 - b.h, b.w, b.h);

    // Windows
    for (const w of b.windows) {
      if (!w.on) continue;
      const wx = bx + w.x + 2;
      const wy = H * 0.55 - b.h + w.y + 2;
      const col = ['#4fc3f7','#ce93d8','#ffb74d','#80cbc4'][Math.floor((b.x+w.x) * 13 % 4)];
      ctx.fillStyle = col + '60';
      ctx.fillRect(wx, wy, 5, 4);
    }
  }
}

function drawParticles() {
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    if (p.y > H * 0.65) { p.y = 0; p.x = Math.random() * WORLD_W; }
    if (p.x < 0) p.x = WORLD_W;
    if (p.x > WORLD_W) p.x = 0;

    const sx = p.x - cameraX;
    if (sx < -20 || sx > W + 20) continue;

    ctx.save();
    ctx.globalAlpha = p.alpha * (0.7 + 0.3 * Math.sin(Date.now()*0.002+p.x));
    ctx.fillStyle = p.color;
    ctx.font = `${p.size * 8}px monospace`;
    ctx.fillText(p.char, sx, p.y);
    ctx.restore();
  }
}

function drawGround() {
  const gy = groundY();

  // Ground base
  const gGrad = ctx.createLinearGradient(0, gy, 0, H);
  gGrad.addColorStop(0, '#1a1a2e');
  gGrad.addColorStop(1, '#0a0a14');
  ctx.fillStyle = gGrad;
  ctx.fillRect(0, gy, W, H - gy);

  // Neon tiles
  const tileW = 80, tileH = 20;
  const offX = (-cameraX * 0.98) % tileW;
  const colors = ['#4fc3f7','#ce93d8','#ffb74d','#80cbc4','#f48fb1'];

  for (let tx = offX - tileW; tx < W + tileW; tx += tileW) {
    for (let row = 0; row < 5; row++) {
      const ty = gy + row * tileH;
      const ci = (Math.floor((tx + cameraX) / tileW) + row * 3) % colors.length;
      ctx.strokeStyle = colors[ci] + '25';
      ctx.lineWidth = 1;
      ctx.strokeRect(tx, ty, tileW, tileH);

      // Glow on first row
      if (row === 0) {
        const glow = ctx.createLinearGradient(tx, ty, tx + tileW, ty);
        glow.addColorStop(0, 'transparent');
        glow.addColorStop(0.5, colors[ci] + '15');
        glow.addColorStop(1, 'transparent');
        ctx.fillStyle = glow;
        ctx.fillRect(tx, ty, tileW, 3);
      }
    }
  }

  // Ground line glow
  ctx.save();
  ctx.strokeStyle = '#4fc3f7';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#4fc3f7';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.moveTo(0, gy);
  ctx.lineTo(W, gy);
  ctx.stroke();
  ctx.restore();
}

function drawBuilding(b) {
  const sx = b.x - cameraX;
  if (sx + b.width < -20 || sx > W + 20) return;
  const gy = groundY();
  const bTop = gy - b.height;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(sx + 6, bTop + 6, b.width, b.height);

  // Body
  const bGrad = ctx.createLinearGradient(sx, bTop, sx + b.width, bTop + b.height);
  bGrad.addColorStop(0, b.darkColor);
  bGrad.addColorStop(1, '#0a0a1a');
  ctx.fillStyle = bGrad;
  ctx.fillRect(sx, bTop, b.width, b.height);

  // Border glow
  ctx.save();
  ctx.strokeStyle = b.color;
  ctx.lineWidth = 1.5;
  ctx.shadowColor = b.color;
  ctx.shadowBlur = 10;
  ctx.strokeRect(sx, bTop, b.width, b.height);
  ctx.restore();

  // Windows grid
  const cols = Math.floor(b.width / 28);
  const rows = Math.floor(b.height / 30);
  for (let c = 0; c < cols; c++) {
    for (let r = 0; r < rows - 1; r++) {
      const wx = sx + 8 + c * 28;
      const wy = bTop + 12 + r * 30;
      const lit = Math.sin(b.x * 0.1 + c * 3 + r * 7 + Date.now() * 0.0005) > 0.1;
      if (!lit) continue;
      ctx.save();
      ctx.fillStyle = b.color + '60';
      ctx.shadowColor = b.color;
      ctx.shadowBlur = 6;
      ctx.fillRect(wx, wy, 14, 10);
      ctx.restore();
    }
  }

  // Sign board
  const signH = 36;
  ctx.save();
  ctx.fillStyle = b.color + '20';
  ctx.strokeStyle = b.color;
  ctx.lineWidth = 1;
  ctx.shadowColor = b.color;
  ctx.shadowBlur = 15;
  ctx.strokeRect(sx + 10, gy - 56, b.width - 20, signH);
  ctx.fillRect(sx + 10, gy - 56, b.width - 20, signH);

  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold 13px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(b.label, sx + b.width / 2, gy - 33);
  ctx.restore();

  // Door
  const doorW = 28, doorH = 40;
  const doorX = sx + b.width / 2 - doorW / 2;
  const doorY = gy - doorH;
  ctx.save();
  ctx.fillStyle = b.color + '30';
  ctx.strokeStyle = b.color;
  ctx.lineWidth = 1;
  ctx.shadowColor = b.color;
  ctx.shadowBlur = 8;
  ctx.strokeRect(doorX, doorY, doorW, doorH);
  ctx.fillRect(doorX, doorY, doorW, doorH);
  ctx.restore();

  // Proximity highlight
  const px = player.x + player.width / 2;
  if (Math.abs(px - (b.x + b.width/2)) < b.width/2 + 30) {
    ctx.save();
    ctx.strokeStyle = b.color;
    ctx.lineWidth = 3;
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 20;
    ctx.strokeRect(sx - 2, bTop - 2, b.width + 4, b.height + 4);
    ctx.restore();
  }
}

function drawNpc(npc) {
  const sx = npc.x - cameraX;
  if (sx < -60 || sx > W + 60) return;
  const gy = groundY();
  const npcH = 44;
  const ny = gy - npcH;

  const time = Date.now() * 0.003;
  const bob = Math.sin(time + npc.x * 0.1) * 2;

  // Shadow
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(sx + 16, gy - 2, 14, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Body (simple pixel character)
  ctx.save();
  ctx.shadowColor = npc.color;
  ctx.shadowBlur = 12;

  // Legs
  ctx.fillStyle = npc.color + 'aa';
  const legOff = Math.sin(time * 2 + npc.x) * 4;
  ctx.fillRect(sx + 8,  ny + bob + 30, 8, 14 + legOff);
  ctx.fillRect(sx + 16, ny + bob + 30, 8, 14 - legOff);

  // Body
  ctx.fillStyle = npc.color + 'dd';
  ctx.fillRect(sx + 6, ny + bob + 14, 20, 18);

  // Head BG
  ctx.fillStyle = '#0a0a1a';
  ctx.beginPath();
  ctx.arc(sx + 16, ny + bob + 10, 14, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();

  // Emoji head
  ctx.font = '20px serif';
  ctx.textAlign = 'center';
  ctx.fillText(npc.emoji, sx + 16, ny + bob + 16);

  // Name tag
  ctx.save();
  ctx.font = 'bold 10px Courier New';
  ctx.textAlign = 'center';
  ctx.fillStyle = npc.color;
  ctx.shadowColor = npc.color;
  ctx.shadowBlur = 8;
  ctx.fillText(npc.name, sx + 16, ny + bob - 6);
  ctx.restore();

  // Role badge
  ctx.save();
  const badgeW = ctx.measureText(npc.role).width + 12;
  ctx.font = '9px Courier New';
  ctx.fillStyle = npc.color + '30';
  ctx.strokeStyle = npc.color + '80';
  ctx.lineWidth = 0.8;
  ctx.roundRect?.(sx + 16 - badgeW/2, ny + bob - 20, badgeW, 13, 3) ||
    ctx.rect(sx + 16 - badgeW/2, ny + bob - 20, badgeW, 13);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = npc.color;
  ctx.textAlign = 'center';
  ctx.fillText(npc.role, sx + 16, ny + bob - 10);
  ctx.restore();

  // Proximity glow
  const px = player.x + player.width / 2;
  if (Math.abs(px - (npc.x + 16)) < 90) {
    ctx.save();
    ctx.strokeStyle = npc.color;
    ctx.lineWidth = 2;
    ctx.shadowColor = npc.color;
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.arc(sx + 16, ny + bob + 10, 22, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();

    // "!" indicator
    ctx.save();
    ctx.font = 'bold 14px Courier New';
    ctx.fillStyle = '#ffb74d';
    ctx.shadowColor = '#ffb74d';
    ctx.shadowBlur = 10;
    ctx.textAlign = 'center';
    ctx.fillText('!', sx + 32, ny + bob - 5);
    ctx.restore();
  }
}

function drawPlayer() {
  const sx = player.x - cameraX;
  const gy = groundY();
  const py = player.y;

  const time = Date.now() * 0.006;
  const walkBob = player.frame % 2 === 0 ? 0 : -2;
  const legOff  = player.frame % 2 === 0 ? 4 : -4;

  ctx.save();
  ctx.shadowColor = '#4fc3f7';
  ctx.shadowBlur = 18;

  // Shadow
  ctx.fillStyle = 'rgba(79,195,247,0.15)';
  ctx.beginPath();
  ctx.ellipse(sx + player.width/2, gy - 2, 16, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.scale(player.facing, 1);
  const rx = player.facing === 1 ? sx : -(sx + player.width);

  // Legs
  ctx.fillStyle = '#1a6a8a';
  ctx.fillRect(rx + 6,  py + 32 + walkBob, 9, 16 + legOff);
  ctx.fillRect(rx + 15, py + 32 + walkBob, 9, 16 - legOff);

  // Boots
  ctx.fillStyle = '#0d4060';
  ctx.fillRect(rx + 5,  py + 46 + walkBob + legOff,  11, 5);
  ctx.fillRect(rx + 14, py + 46 + walkBob - legOff, 11, 5);

  // Body
  ctx.fillStyle = '#1a3a5a';
  ctx.fillRect(rx + 4, py + 16 + walkBob, 22, 18);

  // Jacket accent
  ctx.fillStyle = '#4fc3f7';
  ctx.fillRect(rx + 4,  py + 16 + walkBob, 3, 18);
  ctx.fillRect(rx + 23, py + 16 + walkBob, 3, 18);

  // Arms
  const armOff = Math.sin(time) * 6;
  ctx.fillStyle = '#1a6a8a';
  ctx.fillRect(rx,      py + 18 + walkBob + armOff, 6, 14);
  ctx.fillRect(rx + 24, py + 18 + walkBob - armOff, 6, 14);

  // Head
  ctx.fillStyle = '#0a2040';
  ctx.fillRect(rx + 6, py + 2 + walkBob, 18, 16);

  // Visor
  ctx.fillStyle = '#4fc3f790';
  ctx.fillRect(rx + 7, py + 5 + walkBob, 16, 7);
  ctx.fillStyle = '#4fc3f7';
  ctx.fillRect(rx + 7, py + 5 + walkBob, 16, 2);

  // Hair
  ctx.fillStyle = '#ce93d8';
  ctx.fillRect(rx + 6, py + walkBob, 18, 4);

  ctx.restore();

  // Player name tag
  ctx.save();
  ctx.font = 'bold 11px Courier New';
  ctx.textAlign = 'center';
  ctx.fillStyle = '#4fc3f7';
  ctx.shadowColor = '#4fc3f7';
  ctx.shadowBlur = 10;
  ctx.fillText('YOU', sx + player.width/2, py - 6);
  ctx.restore();
}

// ── MAIN LOOP ──
let lastTime = 0;
function loop(now) {
  if (now - lastTime >= 16) {
    updatePlayer();
    draw();
    lastTime = now;
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ── MUSIC TOGGLE ──
let musicPlaying = false;
function toggleMusic() {
  musicPlaying = !musicPlaying;
  const btn = document.getElementById('music-btn');
  btn.textContent = musicPlaying ? '🔊 音乐' : '🔇 静音';
  btn.style.background = musicPlaying ? '#ce93d840' : '#ce93d820';
}
window.toggleMusic = toggleMusic;
