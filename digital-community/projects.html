<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>项目池 · 数字移民互助共同体</title>
<style>
  :root {
    --bg: #07090f; --bg2: #0d1120; --bg3: #111827;
    --blue: #4fc3f7; --green: #81c784; --purple: #ce93d8;
    --orange: #ffb74d; --red: #ef5350;
    --text: rgba(255,255,255,0.9); --text2: rgba(255,255,255,0.5);
    --border: rgba(255,255,255,0.06);
    --card: rgba(255,255,255,0.04);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(7,9,15,0.85);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px; height: 60px;
  }
  .nav-logo {
    font-size: 18px; font-weight: 700; letter-spacing: 2px;
    background: linear-gradient(135deg, #4fc3f7, #ce93d8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-decoration: none;
  }
  .nav-links { display: flex; gap: 24px; align-items: center; }
  .nav-links a {
    color: var(--text2); text-decoration: none; font-size: 14px;
    transition: color 0.2s;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--blue); }

  /* Mobile Navigation Enhancement */
  .mobile-menu-toggle {
    display: none;
    flex-direction: column;
    cursor: pointer;
    padding: 8px;
    gap: 4px;
    z-index: 101;
  }
  .mobile-menu-toggle span {
    width: 24px;
    height: 2px;
    background: var(--text);
    transition: all 0.3s ease;
    border-radius: 1px;
  }
  .mobile-menu-toggle.active span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
  .mobile-menu-toggle.active span:nth-child(2) { opacity: 0; }
  .mobile-menu-toggle.active span:nth-child(3) { transform: rotate(-45deg) translate(7px, -6px); }

  @media (max-width: 768px) {
    .mobile-menu-toggle { display: flex; }
    .nav-links { display: none; }
    .nav-links.mobile-active { 
        display: flex; 
        position: absolute; 
        top: 60px; 
        left: 0; 
        right: 0; 
        background: rgba(7,9,15,0.98); 
        flex-direction: column; 
        padding: 20px; 
        gap: 16px; 
        border-bottom: 1px solid var(--border);
    }
    nav { padding: 0 20px; }
  }

  @media (max-width: 480px) {
    nav { padding: 0 16px; height: 56px; }
    .nav-links.mobile-active { top: 56px; }
  }

  /* PAGE HEADER */
  .page-header {
    padding: 100px 40px 48px;
    max-width: 1200px; margin: 0 auto;
    text-align: center;
  }
  .page-tag {
    display: inline-block;
    background: rgba(79,195,247,0.1);
    border: 1px solid rgba(79,195,247,0.25);
    border-radius: 20px; padding: 4px 16px;
    font-size: 12px; color: var(--blue); letter-spacing: 2px;
    margin-bottom: 20px;
  }
  .page-header h1 {
    font-size: clamp(28px, 5vw, 48px); font-weight: 800;
    letter-spacing: 2px; margin-bottom: 14px;
  }
  .page-header h1 span {
    background: linear-gradient(135deg, #4fc3f7, #ce93d8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .page-header p { color: var(--text2); font-size: 16px; max-width: 600px; margin: 0 auto; }

  /* OVERVIEW STATS BAR */
  .overview-bar {
    max-width: 1200px; margin: 0 auto 48px;
    padding: 0 40px;
  }
  .overview-inner {
    background: var(--bg2);
    border: 1px solid rgba(79,195,247,0.15);
    border-radius: 20px;
    padding: 28px 40px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 24px;
    position: relative;
    overflow: hidden;
  }
  .overview-inner::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(79,195,247,0.04), rgba(206,147,216,0.04));
    pointer-events: none;
  }
  .overview-stat { text-align: center; }
  .overview-num {
    font-size: 28px; font-weight: 800;
    background: linear-gradient(135deg, #4fc3f7, #ce93d8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    margin-bottom: 4px;
  }
  .overview-label { font-size: 13px; color: var(--text2); }

  /* TOTAL PROGRESS */
  .total-progress-wrap {
    grid-column: 1 / -1;
    margin-top: 8px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }
  .total-progress-header {
    display: flex; justify-content: space-between;
    font-size: 13px; color: var(--text2); margin-bottom: 10px;
  }
  .total-progress-bar {
    height: 8px; background: rgba(255,255,255,0.06);
    border-radius: 4px; overflow: hidden;
  }
  .total-progress-fill {
    height: 100%; border-radius: 4px;
    background: linear-gradient(90deg, #4fc3f7, #ce93d8, #81c784);
    transition: width 1.5s cubic-bezier(0.4,0,0.2,1);
  }

  /* PROJECTS GRID */
  .projects-section {
    max-width: 1200px; margin: 0 auto;
    padding: 0 40px 80px;
  }
  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 24px;
  }

  /* PROJECT CARD */
  .project-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.2s, box-shadow 0.3s;
  }
  .project-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 48px rgba(0,0,0,0.4);
  }
  .project-card.expanded { border-color: var(--accent-color, rgba(79,195,247,0.4)); }

  .card-main { padding: 24px; }

  .card-top {
    display: flex; align-items: flex-start; gap: 16px;
    margin-bottom: 16px;
  }
  .card-icon {
    font-size: 36px; width: 56px; height: 56px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 14px; flex-shrink: 0;
    background: var(--icon-bg, rgba(79,195,247,0.1));
  }
  .card-info { flex: 1; }
  .card-name { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
  .card-desc { font-size: 13px; color: var(--text2); line-height: 1.5; }

  /* PROGRESS */
  .card-progress { margin-bottom: 18px; }
  .progress-nums {
    display: flex; justify-content: space-between; align-items: baseline;
    margin-bottom: 8px;
  }
  .progress-raised { font-size: 20px; font-weight: 800; color: var(--accent-color, var(--blue)); }
  .progress-target { font-size: 13px; color: var(--text2); }
  .progress-pct { font-size: 13px; font-weight: 700; color: var(--accent-color, var(--blue)); }
  .progress-bar {
    height: 6px; background: rgba(255,255,255,0.06);
    border-radius: 3px; overflow: hidden; margin-bottom: 8px;
  }
  .progress-fill {
    height: 100%; border-radius: 3px;
    background: linear-gradient(90deg, var(--accent-color, #4fc3f7), var(--accent-color2, #81d4fa));
    transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
    width: 0;
  }

  /* META ROW */
  .card-meta {
    display: flex; gap: 20px; flex-wrap: wrap;
    padding: 14px 0;
    border-top: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .meta-item { }
  .meta-label { font-size: 11px; color: var(--text2); margin-bottom: 3px; }
  .meta-value { font-size: 13px; font-weight: 600; }

  /* CARD ACTIONS */
  .card-actions {
    display: flex; gap: 10px;
  }
  .btn-detail {
    flex: 1; padding: 10px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px; color: var(--text2);
    font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
    font-family: inherit;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-detail:hover { border-color: var(--accent-color, var(--blue)); color: var(--accent-color, var(--blue)); }
  .btn-detail.open { background: rgba(79,195,247,0.08); border-color: rgba(79,195,247,0.3); color: var(--blue); }

  .btn-join {
    flex: 1; padding: 10px;
    background: linear-gradient(135deg, var(--accent-color, #4fc3f7), var(--accent-color2, #7c4dff));
    border: none; border-radius: 10px;
    color: #fff; font-size: 13px; font-weight: 700;
    cursor: pointer; transition: all 0.2s;
    font-family: inherit; text-decoration: none;
    display: flex; align-items: center; justify-content: center; gap: 6px;
    box-shadow: 0 4px 16px rgba(79,195,247,0.2);
  }
  .btn-join:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(79,195,247,0.35); }

  /* DETAIL PANEL */
  .card-detail {
    max-height: 0; overflow: hidden;
    transition: max-height 0.5s cubic-bezier(0.4,0,0.2,1);
    border-top: 0px solid var(--border);
  }
  .card-detail.open {
    max-height: 600px;
    border-top: 1px solid var(--border);
  }
  .detail-inner { padding: 24px; }

  .detail-section { margin-bottom: 20px; }
  .detail-section:last-child { margin-bottom: 0; }
  .detail-section h4 {
    font-size: 13px; color: var(--text2); letter-spacing: 1px;
    margin-bottom: 12px; text-transform: uppercase;
    display: flex; align-items: center; gap: 6px;
  }
  .detail-section h4::after {
    content: ''; flex: 1; height: 1px;
    background: var(--border);
  }

  .detail-desc { font-size: 14px; color: rgba(255,255,255,0.7); line-height: 1.8; }

  /* FUND BREAKDOWN */
  .fund-items { display: flex; flex-direction: column; gap: 8px; }
  .fund-item {
    display: flex; align-items: center; gap: 10px;
  }
  .fund-label { font-size: 13px; color: var(--text2); width: 120px; flex-shrink: 0; }
  .fund-bar-wrap { flex: 1; }
  .fund-bar {
    height: 4px; background: rgba(255,255,255,0.06);
    border-radius: 2px; overflow: hidden;
  }
  .fund-fill {
    height: 100%; border-radius: 2px;
    background: var(--accent-color, #4fc3f7);
    transition: width 1s ease;
  }
  .fund-pct { font-size: 12px; color: var(--text2); width: 36px; text-align: right; flex-shrink: 0; }

  /* MILESTONES */
  .milestones { display: flex; flex-direction: column; gap: 8px; }
  .milestone {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 10px 12px;
    background: rgba(255,255,255,0.03);
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .milestone-dot {
    width: 8px; height: 8px; border-radius: 50%;
    margin-top: 5px; flex-shrink: 0;
  }
  .milestone-done .milestone-dot { background: var(--green); }
  .milestone-active .milestone-dot { background: var(--blue); box-shadow: 0 0 8px var(--blue); }
  .milestone-pending .milestone-dot { background: rgba(255,255,255,0.2); }
  .milestone-content { flex: 1; }
  .milestone-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .milestone-time { font-size: 12px; color: var(--text2); }
  .milestone-tag {
    font-size: 11px; padding: 2px 8px; border-radius: 10px;
    flex-shrink: 0; align-self: flex-start;
    font-weight: 600;
  }
  .tag-done { background: rgba(129,199,132,0.15); color: var(--green); }
  .tag-active { background: rgba(79,195,247,0.15); color: var(--blue); }
  .tag-pending { background: rgba(255,255,255,0.05); color: var(--text2); }

  /* LATEST UPDATE BADGE */
  .latest-update {
    margin-top: 14px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: var(--text2);
    transition: border-color 0.2s;
  }
  .latest-update:hover { border-color: rgba(255,255,255,0.1); }
  .update-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green); box-shadow: 0 0 6px var(--green);
    flex-shrink: 0; animation: updatePulse 2s ease-in-out infinite;
  }
  @keyframes updatePulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
  .update-text { flex: 1; line-height: 1.4; }
  .update-time { font-size: 11px; color: rgba(255,255,255,0.25); flex-shrink: 0; }

  /* BG */
  .bg-glow {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 70% 50% at 30% 20%, rgba(79,195,247,0.04) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 70% 70%, rgba(206,147,216,0.04) 0%, transparent 60%);
  }

  footer {
    border-top: 1px solid var(--border);
    padding: 28px 40px; text-align: center;
    color: var(--text2); font-size: 13px;
    position: relative; z-index: 1;
  }

  @media (max-width: 768px) {
    nav { padding: 0 16px; }
    .nav-links { gap: 12px; }
    .page-header { padding: 88px 20px 36px; }
    .overview-bar { padding: 0 20px; }
    .overview-inner { padding: 20px; grid-template-columns: repeat(2, 1fr); }
    .projects-section { padding: 0 20px 60px; }
    .projects-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="bg-glow"></div>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="index.html">🌐 数字移民共同体</a>
  <div class="nav-links">
    <a href="index.html">首页</a>
    <a href="projects.html" class="active">项目池</a>
    <a href="dashboard.html">仪表盘</a>
    <a href="leaderboard.html">排行榜</a>
    <a href="ai-events.html">🌐 AI大事件</a>
    <a href="exchange.html">兑换</a>
    <a href="governance.html">治理</a>
    <a href="manifesto.html">宣言</a>
    <a href="city.html">🎮 城市</a>
    <div id="navAuthArea" style="display:flex;align-items:center;gap:10px;"></div>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="page-tag">✦ 六大核心项目</div>
  <h1>投入现实，<span>守护生存</span></h1>
  <p>每一笔数字贡献，都将流向真实世界的生存基础设施建设</p>
</div>

<!-- OVERVIEW BAR -->
<div class="overview-bar">
  <div class="overview-inner">
    <div class="overview-stat">
      <div class="overview-num" id="totalRaised">$688,000</div>
      <div class="overview-label">已募总额</div>
    </div>
    <div class="overview-stat">
      <div class="overview-num" id="totalGoal">$3,200,000</div>
      <div class="overview-label">总目标金额</div>
    </div>
    <div class="overview-stat">
      <div class="overview-num">4,217</div>
      <div class="overview-label">总参与人数</div>
    </div>
    <div class="overview-stat">
      <div class="overview-num">6</div>
      <div class="overview-label">运行中项目</div>
    </div>
    <div class="total-progress-wrap">
      <div class="total-progress-header">
        <span>总体募集进度</span>
        <span id="totalPct">21.5%</span>
      </div>
      <div class="total-progress-bar">
        <div class="total-progress-fill" id="totalFill" style="width:0"></div>
      </div>
    </div>
  </div>
</div>

<!-- PROJECTS -->
<div class="projects-section">
  <div class="projects-grid" id="projectsGrid"></div>
</div>

<footer>
  <p>🌐 数字移民互助共同体 · 每一分贡献都在改变现实</p>
</footer>

<script>
// Loading state management
function showLoadingState() {
  const grid = document.getElementById('projectsGrid');
  if (grid && grid.children.length === 0) {
    grid.innerHTML = '<div style="text-align:center;padding:60px;color:var(--text2)">⏳ 项目数据加载中...</div>';
  }
}

// Error boundary for project cards
function createProjectCard(p) {
  try {
    const pct = getPct(p.raised, p.goal);
    
    const fundsHtml = p.funds?.map(f => `
      <div class="fund-item">
        <div class="fund-label">${f.label}</div>
        <div class="fund-bar-wrap">
          <div class="fund-bar"><div class="fund-fill" style="width:${f.pct}%;background:${p.accentColor}"></div></div>
        </div>
        <div class="fund-pct">${f.pct}%</div>
      </div>`).join('') || '<div>暂无资金明细</div>';

    const milestonesHtml = p.milestones?.map(m => {
      const st = getMilestoneStatus(m.status);
      return `
        <div class="milestone ${st.cls}">
          <div class="milestone-dot"></div>
          <div class="milestone-content">
            <div class="milestone-title">${m.title}</div>
            <div class="milestone-time">${m.time}</div>
          </div>
          <span class="milestone-tag ${st.tag}">${st.label}</span>
        </div>`;
    }).join('') || '<div>暂无里程碑信息</div>';

    return document.createRange().createContextualFragment(``
      <div class="project-card" id="card-${p.id}" style="--accent-color:${p.accentColor};--accent-color2:${p.accentColor2}">
        <div class="card-main">
          <div class="latest-update">
            <div class="update-dot"></div>
            <div class="update-text">${p.latestUpdate || '暂无最新更新'}</div>
            <div class="update-time">最新</div>
          </div>
          <div class="card-top">
            <div class="card-icon" style="background:${p.iconBg}">${p.icon}</div>
            <div class="card-info">
              <div class="card-name">${p.name}</div>
              <div class="card-desc">${p.desc}</div>
            </div>
          </div>
          <div class="card-progress">
            <div class="progress-nums">
              <div>
                <span class="progress-raised" style="color:${p.accentColor}">${formatMoney(p.raised)}</span>
                <span class="progress-target"> / ${formatMoney(p.goal)}</span>
              </div>
              <span class="progress-pct" style="color:${p.accentColor}">${pct}%</span>
            </div>
            <div class="progress-bar">
              <div class="progress-fill" data-width="${pct}" style="background:linear-gradient(90deg,${p.accentColor},${p.accentColor2})"></div>
            </div>
          </div>
          <div class="card-meta">
            <div class="meta-item">
              <div class="meta-label">参与人数</div>
              <div class="meta-value">${p.participants?.toLocaleString() || 0} 人</div>
            </div>
            <div class="meta-item">
              <div class="meta-label">保障兑换比例</div>
              <div class="meta-value" style="color:${p.accentColor};font-size:12px">${p.exchangeRatio || '待定'}</div>
            </div>
          </div>
          <div class="card-actions">
            <button class="btn-detail" onclick="toggleDetail('${p.id}')">
              <span id="detail-arrow-${p.id}">▼</span> 了解更多
            </button>
            <a href="apply.html" class="btn-join" style="background:linear-gradient(135deg,${p.accentColor},${p.accentColor2})">
              参与此项目 →
            </a>
          </div>
        </div>
        <div class="card-detail" id="detail-${p.id}">
          <div class="detail-inner">
            <div class="detail-section">
              <h4>📋 项目详情</h4>
              <p class="detail-desc">${p.detail || '项目详情正在完善中...'}</p>
            </div>
            <div class="detail-section">
              <h4>💰 资金用途分解</h4>
              <div class="fund-items">${fundsHtml}</div>
            </div>
            <div class="detail-section">
              <h4>🎯 里程碑计划</h4>
              <div class="milestones">${milestonesHtml}</div>
            </div>
          </div>
        </div>
      </div>
    ``);
  } catch (error) {
    console.error('Error creating project card:', p.id, error);
    return document.createRange().createContextualFragment(`
      <div class="project-card" style="border-color:var(--red);">
        <div class="card-main" style="text-align:center;padding:40px;">
          <div style="font-size:24px;margin-bottom:16px;">⚠️</div>
          <div style="color:var(--red);">项目 ${p.id} 加载失败</div>
          <div style="font-size:12px;color:var(--text2);margin-top:8px;">请稍后重试</div>
        </div>
      </div>
    `);
  }
}

const PROJECTS = [
  {
    id: 'water',
    icon: '🌊',
    name: '净水项目',
    desc: '分布式净水站建设，为缺水社区提供安全饮用水',
    raised: 127000, goal: 500000,
    participants: 623,
    exchangeRatio: '每$1000贡献 = 30天净水配额',
    latestUpdate: '本月新增 47 位参与者，第3座净水站已建成投运，服务500户家庭',
    accentColor: '#4fc3f7',
    accentColor2: '#81d4fa',
    iconBg: 'rgba(79,195,247,0.12)',

function formatMoney(n) {
  if (n >= 1000000) return '$' + (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return '$' + (n/1000).toFixed(0) + ',000';
  return '$' + n;
}

function getPct(raised, goal) {
  return Math.round(raised / goal * 100);
}

function getMilestoneStatus(s) {
  if (s === 'done') return { cls: 'milestone-done', tag: 'tag-done', label: '已完成' };
  if (s === 'active') return { cls: 'milestone-active', tag: 'tag-active', label: '进行中' };
  return { cls: 'milestone-pending', tag: 'tag-pending', label: '计划中' };
}

function renderCards() {
  const grid = document.getElementById('projectsGrid');
  PROJECTS.forEach(p => {
    const pct = getPct(p.raised, p.goal);

    const fundsHtml = p.funds.map(f => `
      <div class="fund-item">
        <div class="fund-label">${f.label}</div>
        <div class="fund-bar-wrap">
          <div class="fund-bar"><div class="fund-fill" style="width:${f.pct}%;background:${p.accentColor}"></div></div>
        </div>
        <div class="fund-pct">${f.pct}%</div>
      </div>`).join('');

    const milestonesHtml = p.milestones.map(m => {
      const st = getMilestoneStatus(m.status);
      return `
        <div class="milestone ${st.cls}">
          <div class="milestone-dot"></div>
          <div class="milestone-content">
            <div class="milestone-title">${m.title}</div>
            <div class="milestone-time">${m.time}</div>
          </div>
          <span class="milestone-tag ${st.tag}">${st.label}</span>
        </div>`;
    }).join('');

    const card = document.createElement('div');
    card.className = 'project-card';
    card.id = 'card-' + p.id;
    card.style.setProperty('--accent-color', p.accentColor);
    card.style.setProperty('--accent-color2', p.accentColor2);
    card.innerHTML = `
      <div class="card-main">
        <div class="latest-update">
          <div class="update-dot"></div>
          <div class="update-text">${p.latestUpdate}</div>
          <div class="update-time">最新</div>
        </div>
        <div class="card-top">
          <div class="card-icon" style="background:${p.iconBg}">${p.icon}</div>
          <div class="card-info">
            <div class="card-name">${p.name}</div>
            <div class="card-desc">${p.desc}</div>
          </div>
        </div>
        <div class="card-progress">
          <div class="progress-nums">
            <div>
              <span class="progress-raised" style="color:${p.accentColor}">${formatMoney(p.raised)}</span>
              <span class="progress-target"> / ${formatMoney(p.goal)}</span>
            </div>
            <span class="progress-pct" style="color:${p.accentColor}">${pct}%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" data-width="${pct}" style="background:linear-gradient(90deg,${p.accentColor},${p.accentColor2})"></div>
          </div>
        </div>
        <div class="card-meta">
          <div class="meta-item">
            <div class="meta-label">参与人数</div>
            <div class="meta-value">${p.participants.toLocaleString()} 人</div>
          </div>
          <div class="meta-item">
            <div class="meta-label">保障兑换比例</div>
            <div class="meta-value" style="color:${p.accentColor};font-size:12px">${p.exchangeRatio}</div>
          </div>
        </div>
        <div class="card-actions">
          <button class="btn-detail" onclick="toggleDetail('${p.id}')">
            <span id="detail-arrow-${p.id}">▼</span> 了解更多
          </button>
          <a href="apply.html" class="btn-join" style="background:linear-gradient(135deg,${p.accentColor},${p.accentColor2})">
            参与此项目 →
          </a>
        </div>
      </div>
      <div class="card-detail" id="detail-${p.id}">
        <div class="detail-inner">
          <div class="detail-section">
            <h4>📋 项目详情</h4>
            <p class="detail-desc">${p.detail}</p>
          </div>
          <div class="detail-section">
            <h4>💰 资金用途分解</h4>
            <div class="fund-items">${fundsHtml}</div>
          </div>
          <div class="detail-section">
            <h4>🎯 里程碑计划</h4>
            <div class="milestones">${milestonesHtml}</div>
          </div>
        </div>
      </div>`;
    grid.appendChild(card);
  });

  // Animate progress bars on load
  setTimeout(() => {
    document.querySelectorAll('.progress-fill[data-width]').forEach(el => {
      el.style.width = el.dataset.width + '%';
    });
    document.getElementById('totalFill').style.width = '21.5%';
  }, 300);
}

function toggleDetail(id) {
  const detail = document.getElementById('detail-' + id);
  const arrow = document.getElementById('detail-arrow-' + id);
  const card = document.getElementById('card-' + id);
  const btn = detail.previousElementSibling.querySelector('.btn-detail');
  const isOpen = detail.classList.contains('open');

  if (isOpen) {
    detail.classList.remove('open');
    arrow.textContent = '▼';
    btn.classList.remove('open');
    card.classList.remove('expanded');
  } else {
    detail.classList.add('open');
    arrow.textContent = '▲';
    btn.classList.add('open');
    card.classList.add('expanded');
  }
}

function handleJoin(e) {
  e.preventDefault();
  const user = localStorage.getItem('dc_current_user');
  if (user) {
    window.location.href = 'profile.html';
  } else {
    window.location.href = 'login.html';
  }
}
