<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贡献排行榜 · 数字移民互助共同体</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
<style>
  :root {
    --bg: #07090f; --bg2: #0d1120; --bg3: #111827;
    --blue: #4fc3f7; --green: #81c784; --purple: #ce93d8;
    --orange: #ffb74d; --red: #ef5350;
    --text: rgba(255,255,255,0.9); --text2: rgba(255,255,255,0.5);
    --border: rgba(255,255,255,0.06);
    --card: rgba(255,255,255,0.04);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'PingFang SC', 'Microsoft YaHei', 'Noto Sans SC', sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(7,9,15,0.88);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px; height: 60px;
  }
  .nav-logo {
    font-size: 18px; font-weight: 700; letter-spacing: 2px;
    background: linear-gradient(135deg, #4fc3f7, #ce93d8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-decoration: none;
  }
  .nav-links { display: flex; gap: 24px; align-items: center; }
  .nav-links a { color: var(--text2); text-decoration: none; font-size: 14px; transition: color 0.2s; }
  .nav-links a:hover, .nav-links a.active { color: var(--blue); }

  .bg-glow {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background:
      radial-gradient(ellipse 70% 50% at 50% 20%, rgba(255,183,77,0.05) 0%, transparent 70%),
      radial-gradient(ellipse 50% 40% at 20% 70%, rgba(79,195,247,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 80% 60%, rgba(206,147,216,0.04) 0%, transparent 60%);
  }

  .page-wrap { max-width: 1100px; margin: 0 auto; padding: 88px 40px 80px; position: relative; z-index: 1; }

  /* PAGE HEADER */
  .page-header { text-align: center; margin-bottom: 48px; }
  .page-tag {
    display: inline-block;
    background: rgba(255,183,77,0.1); border: 1px solid rgba(255,183,77,0.25);
    border-radius: 20px; padding: 4px 16px;
    font-size: 12px; color: var(--orange); letter-spacing: 2px;
    margin-bottom: 16px;
  }
  .page-header h1 {
    font-size: clamp(28px, 5vw, 48px); font-weight: 900; letter-spacing: 2px; margin-bottom: 12px;
  }
  .page-header h1 span {
    background: linear-gradient(135deg, #ffb74d, #ff8a65);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .page-header p { color: var(--text2); font-size: 15px; }

  /* MY RANK BANNER */
  .my-rank-banner {
    background: var(--bg2);
    border: 1px solid rgba(79,195,247,0.2);
    border-radius: 20px; padding: 24px 32px;
    display: flex; align-items: center; gap: 24px;
    margin-bottom: 32px;
    position: relative; overflow: hidden;
  }
  .my-rank-banner::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(79,195,247,0.05), rgba(255,183,77,0.04));
  }
  .my-rank-icon { font-size: 40px; flex-shrink: 0; }
  .my-rank-info { flex: 1; }
  .my-rank-label { font-size: 12px; color: var(--text2); letter-spacing: 1px; margin-bottom: 4px; }
  .my-rank-name { font-size: 20px; font-weight: 800; margin-bottom: 2px; }
  .my-rank-detail { font-size: 13px; color: var(--text2); }
  .my-rank-num {
    font-size: 56px; font-weight: 900; line-height: 1;
    background: linear-gradient(135deg, #ffb74d, #ff8a65);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    flex-shrink: 0; min-width: 80px; text-align: right;
  }
  .my-rank-label2 { font-size: 13px; color: var(--text2); text-align: center; margin-top: 4px; }

  /* PERIOD TABS */
  .period-tabs {
    display: flex; gap: 8px; margin-bottom: 28px; flex-wrap: wrap;
  }
  .period-tab {
    padding: 8px 20px; border-radius: 10px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    border: 1px solid var(--border); color: var(--text2);
    background: transparent; font-family: inherit; transition: all 0.2s;
  }
  .period-tab:hover { border-color: var(--orange); color: var(--orange); }
  .period-tab.active {
    background: rgba(255,183,77,0.12); border-color: rgba(255,183,77,0.4);
    color: var(--orange);
  }

  /* TOP 3 PODIUM */
  .podium {
    display: flex; align-items: flex-end; justify-content: center;
    gap: 16px; margin-bottom: 40px;
  }
  .podium-item {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    width: 180px; cursor: pointer;
  }
  .podium-avatar {
    width: 72px; height: 72px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; font-weight: 900;
    border: 3px solid transparent; position: relative;
    transition: transform 0.2s;
  }
  .podium-item:hover .podium-avatar { transform: scale(1.08); }
  .podium-crown {
    position: absolute; top: -16px; left: 50%; transform: translateX(-50%);
    font-size: 22px;
  }
  .podium-rank {
    font-size: 13px; font-weight: 700; letter-spacing: 1px;
  }
  .podium-name { font-size: 15px; font-weight: 700; text-align: center; }
  .podium-score { font-size: 13px; color: var(--text2); }
  .podium-bar {
    width: 100%; border-radius: 12px 12px 0 0;
    position: relative;
    display: flex; align-items: center; justify-content: center;
  }
  .podium-bar-num {
    font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.7);
    position: absolute; top: 12px;
  }

  /* FIRST PLACE */
  .podium-item.first .podium-avatar {
    width: 88px; height: 88px; font-size: 34px;
    background: linear-gradient(135deg, rgba(255,213,0,0.2), rgba(255,183,77,0.1));
    border-color: #ffd700;
    box-shadow: 0 0 24px rgba(255,213,0,0.3);
  }
  .podium-item.first .podium-rank { color: #ffd700; }
  .podium-item.first .podium-bar {
    height: 120px; background: linear-gradient(180deg, rgba(255,213,0,0.2), rgba(255,183,77,0.05));
    border: 1px solid rgba(255,213,0,0.2);
  }
  .podium-item.second .podium-avatar {
    background: linear-gradient(135deg, rgba(192,192,192,0.2), rgba(160,160,160,0.1));
    border-color: #c0c0c0;
    box-shadow: 0 0 16px rgba(192,192,192,0.2);
  }
  .podium-item.second .podium-rank { color: #c0c0c0; }
  .podium-item.second .podium-bar {
    height: 88px; background: linear-gradient(180deg, rgba(192,192,192,0.15), rgba(160,160,160,0.04));
    border: 1px solid rgba(192,192,192,0.15);
  }
  .podium-item.third .podium-avatar {
    background: linear-gradient(135deg, rgba(205,127,50,0.2), rgba(180,100,30,0.1));
    border-color: #cd7f32;
    box-shadow: 0 0 14px rgba(205,127,50,0.2);
  }
  .podium-item.third .podium-rank { color: #cd7f32; }
  .podium-item.third .podium-bar {
    height: 64px; background: linear-gradient(180deg, rgba(205,127,50,0.15), rgba(180,100,30,0.04));
    border: 1px solid rgba(205,127,50,0.15);
  }

  /* LEADERBOARD TABLE */
  .lb-table {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px; overflow: hidden;
    margin-bottom: 40px;
  }
  .lb-header {
    display: grid;
    grid-template-columns: 60px 1fr 120px 120px 100px;
    padding: 14px 24px;
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid var(--border);
    font-size: 12px; color: var(--text2); font-weight: 600; letter-spacing: 1px;
  }
  .lb-row {
    display: grid;
    grid-template-columns: 60px 1fr 120px 120px 100px;
    padding: 16px 24px; align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.02);
    transition: background 0.2s;
    cursor: pointer;
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-row:hover { background: rgba(255,255,255,0.03); }
  .lb-row.highlight {
    background: rgba(255,183,77,0.06);
    border-left: 3px solid var(--orange);
    padding-left: 21px;
  }
  .lb-rank {
    font-size: 16px; font-weight: 900; text-align: center;
    display: flex; align-items: center; justify-content: center;
  }
  .rank-medal { font-size: 20px; }
  .lb-member { display: flex; align-items: center; gap: 14px; }
  .lb-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.1);
  }
  .lb-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .lb-tag {
    display: inline-block; font-size: 10px; padding: 1px 7px;
    border-radius: 8px; font-weight: 700; letter-spacing: 0.5px;
  }
  .tag-core { background: rgba(255,213,0,0.15); color: #ffd700; border: 1px solid rgba(255,213,0,0.25); }
  .tag-contributor { background: rgba(206,147,216,0.15); color: var(--purple); border: 1px solid rgba(206,147,216,0.25); }
  .tag-migrant { background: rgba(79,195,247,0.15); color: var(--blue); border: 1px solid rgba(79,195,247,0.25); }
  .tag-observer { background: rgba(255,255,255,0.06); color: var(--text2); border: 1px solid var(--border); }
  .lb-score { font-size: 15px; font-weight: 800; color: var(--orange); }
  .lb-change { font-size: 13px; }
  .change-up { color: var(--green); }
  .change-down { color: var(--red); }
  .change-same { color: var(--text2); }
  .lb-level { text-align: right; }
  .level-bar-wrap {
    height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px;
    overflow: hidden; margin-top: 4px;
  }
  .level-bar-fill { height: 100%; border-radius: 2px; }

  /* MINI CHART */
  .chart-row {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
    margin-bottom: 40px;
  }
  .chart-card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 20px; padding: 24px;
  }
  .chart-title { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .chart-sub { font-size: 12px; color: var(--text2); margin-bottom: 16px; }

  footer {
    border-top: 1px solid var(--border);
    padding: 24px 40px; text-align: center;
    color: var(--text2); font-size: 13px;
  }

  @media (max-width: 768px) {
    nav { padding: 0 16px; }
    .nav-links { gap: 12px; }
    .page-wrap { padding: 76px 16px 60px; }
    .lb-header, .lb-row { grid-template-columns: 48px 1fr 80px; }
    .lb-header > :nth-child(4), .lb-header > :nth-child(5),
    .lb-row > :nth-child(4), .lb-row > :nth-child(5) { display: none; }
    .podium-item { width: 100px; }
    .podium-item.first .podium-avatar { width: 68px; height: 68px; }
    .chart-row { grid-template-columns: 1fr; }
    .my-rank-banner { flex-wrap: wrap; }
    .my-rank-num { font-size: 40px; }
  }
</style>
</head>

<nav>

      <span style="font-size:20px">🏙️</span>

  <!-- PERIOD TABS -->
  <div class="period-tabs">

    <button class="period-tab" onclick="setPeriod('month', this)">本月</button>

    <button class="period-tab" onclick="setPeriod('water', this)">💧 净水</button>
    <button class="period-tab" onclick="setPeriod('energy', this)">⚡ 能源</button>
    <button class="period-tab" onclick="setPeriod('food', this)">🌾 粮食</button>

  <div class="lb-table">

  <!-- CHARTS -->
  <div class="chart-row">

      <div class="chart-title">📈 Top10贡献对比</div>
      <div class="chart-sub">前10名成员贡献积分横向对比</div>

<script>
// ── Demo data + real user data merge ──
const BASE_MEMBERS = [
  { name: '陈磊', avatar: '🦅', score: 12840, level: '💎 核心节点', levelPct: 96, change: +340, tag: 'core', project: 'water' },
  { name: '林晓', avatar: '🌸', score: 11200, level: '💎 核心节点', levelPct: 89, change: +210, tag: 'core', project: 'energy' },
  { name: '王浩', avatar: '🔥', score: 9870, level: '⭐ 贡献者', levelPct: 78, change: +180, tag: 'contributor', project: 'food' },
  { name: 'Aria_W', avatar: '🌊', score: 8640, level: '⭐ 贡献者', levelPct: 68, change: +120, tag: 'contributor', project: 'water' },
  { name: 'Nova_K', avatar: '✨', score: 7320, level: '⭐ 贡献者', levelPct: 58, change: +96, tag: 'contributor', project: 'ecology' },
  { name: 'Sam_H', avatar: '🌿', score: 6100, level: '⭐ 贡献者', levelPct: 48, change: +64, tag: 'contributor', project: 'food' },
  { name: '张三', avatar: '🎯', score: 4800, level: '✈️ 移民', levelPct: 38, change: +40, tag: 'migrant', project: 'air' },
  { name: 'Ryo_M', avatar: '🎌', score: 4200, level: '✈️ 移民', levelPct: 33, change: -20, tag: 'migrant', project: 'water' },
  { name: 'Lena_Z', avatar: '🦋', score: 3600, level: '✈️ 移民', levelPct: 28, change: +30, tag: 'migrant', project: 'medical' },
  { name: '李四', avatar: '🚀', score: 3100, level: '✈️ 移民', levelPct: 24, change: 0, tag: 'migrant', project: 'energy' },
  { name: 'Zoe_P', avatar: '🌺', score: 2700, level: '✈️ 移民', levelPct: 21, change: +15, tag: 'migrant', project: 'ecology' },
  { name: '赵五', avatar: '🎭', score: 2100, level: '✈️ 移民', levelPct: 16, change: -10, tag: 'migrant', project: 'air' },
  { name: '钱六', avatar: '🌙', score: 1680, level: '👁️ 观察者', levelPct: 13, change: +5, tag: 'observer', project: 'food' },
  { name: '孙七', avatar: '⚡', score: 1200, level: '👁️ 观察者', levelPct: 9, change: 0, tag: 'observer', project: 'water' },
  { name: '周八', avatar: '🌟', score: 960, level: '👁️ 观察者', levelPct: 7, change: +8, tag: 'observer', project: 'medical' },
];

const LEVEL_COLORS = {
  core: '#ffd700',
  contributor: '#ce93d8',
  migrant: '#4fc3f7',
  observer: 'rgba(255,255,255,0.3)',
};

const TAG_LABELS = {
  core: '核心节点', contributor: '贡献者', migrant: '移民', observer: '观察者'
};

// Merge real users from localStorage
function buildLeaderboard() {
  const users = JSON.parse(localStorage.getItem('dc_users') || '[]');
  const realEntries = users.map(u => ({
    name: u.username || u.email.split('@')[0],
    avatar: '🧑',
    score: u.contributionScore || 0,
    level: '✈️ 移民',
    levelPct: Math.min(Math.round((u.contributionScore || 0) / 150), 100),
    change: 0,
    tag: 'migrant',
    project: 'water',
    isReal: true,
    email: u.email,
  }));

  const allEntries = [...BASE_MEMBERS, ...realEntries];
  allEntries.sort((a, b) => b.score - a.score);
  return allEntries;
}

let currentPeriod = 'all';
let allData = buildLeaderboard();
let topChartInstance = null;

function setPeriod(period, btn) {
  currentPeriod = period;
  document.querySelectorAll('.period-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  let data = [...allData];
  if (period === 'month') data = data.map(d => ({...d, score: Math.round(d.score * (0.3 + Math.random() * 0.3))})).sort((a,b)=>b.score-a.score);
  if (period === 'week') data = data.map(d => ({...d, score: Math.round(d.score * (0.05 + Math.random() * 0.1))})).sort((a,b)=>b.score-a.score);
  if (['water','energy','food','medical'].includes(period)) {
    // 按项目筛选，保留至少5条数据
    const filtered = data.filter(d => d.project === period);
    const others = data.filter(d => d.project !== period);
    data = [...filtered, ...others.slice(0, Math.max(0, 8 - filtered.length))].sort((a,b)=>b.score-a.score);
  }

  renderPodium(data.slice(0, 3));
  renderTable(data);
  renderTopChart(data.slice(0, 10));
}

function renderMyRank() {
  const email = localStorage.getItem('dc_current_user');
  const banner = document.getElementById('myRankBanner');
  if (!email) {
    banner.innerHTML = `
      <div class="my-rank-icon">🏆</div>
      <div class="my-rank-info">
        <div class="my-rank-label">你的排名</div>
        <div class="my-rank-name" style="color:var(--text2)">未登录</div>
        <div class="my-rank-detail">登录后查看你在排行榜中的位置</div>
      </div>
      <a href="login.html" style="padding:10px 24px;background:linear-gradient(135deg,#4fc3f7,#7c4dff);border-radius:10px;color:#fff;text-decoration:none;font-weight:700;font-size:14px;flex-shrink:0;">立即登录</a>`;
    return;
  }
  const idx = allData.findIndex(d => d.isReal && d.email === email);
  const rank = idx >= 0 ? idx + 1 : '未上榜';
  const entry = idx >= 0 ? allData[idx] : { name: email.split('@')[0], score: 0, level: '👁️ 观察者' };

  banner.innerHTML = `
    <div class="my-rank-icon">👤</div>
    <div class="my-rank-info">
      <div class="my-rank-label">你的排名</div>
      <div class="my-rank-name">${entry.name}</div>
      <div class="my-rank-detail">${entry.level} · 贡献积分 ${(entry.score||0).toLocaleString()} 分</div>
    </div>
    <div>
      <div class="my-rank-num">#${rank}</div>
      <div class="my-rank-label2">当前名次</div>
    </div>`;
}

function renderPodium(top3) {
  const podium = document.getElementById('podium');
  const order = [1, 0, 2]; // Second, First, Third
  const clsMap = ['second', 'first', 'third'];
  const rankLabels = ['🥇 第1名', '🥈 第2名', '🥉 第3名'];
  const crowns = ['👑', '', ''];
  const heights = [88, 120, 64];

  podium.innerHTML = order.map(i => {
    const d = top3[i];
    if (!d) return '';
    const cls = clsMap[i];
    const crown = i === 0 ? '<div class="podium-crown">👑</div>' : '';
    return `
      <div class="podium-item ${cls}">
        <div class="podium-avatar" style="position:relative">
          ${crown}
          ${d.avatar}
        </div>
        <div class="podium-name">${d.name}</div>
        <div class="podium-score">${d.score.toLocaleString()} 分</div>
        <div class="podium-rank">${rankLabels[i]}</div>
        <div class="podium-bar" style="height:${heights[i]}px">
          <div class="podium-bar-num">${['2nd','1st','3rd'][i]}</div>
        </div>
      </div>`;
  }).join('');
}

function renderTable(data) {
  const currentEmail = localStorage.getItem('dc_current_user');
  const body = document.getElementById('lbBody');
// ── SKILL REPUTATION BADGES (灵感来源: DAO声誉机制 + Zelos技能平台) ──
const SKILL_BADGES = {
  '陈磊':   ['💧 净水', '🌱 生态', '🗳️ 治理'],
  '林晓':   ['⚡ 能源', '🏥 医疗', '📚 教育'],
  '王浩':   ['🌾 粮食', '🏠 住房', '🔗 区块链'],
  'Aria_W': ['💧 净水', '🏥 医疗', '💻 开发'],
  'Nova_K': ['🌱 生态', '🎨 设计', '🌬️ 空气'],
  'Sam_H':  ['🌾 粮食', '⚖️ 法律', '🌏 东南亚'],
  '张三':   ['🌬️ 空气', '📊 数据'],
  'Ryo_M':  ['💧 净水', '📊 财务'],
  'Lena_Z': ['🏥 医疗', '🌐 翻译'],
  '李四':   ['⚡ 能源'],
  'Zoe_P':  ['🌱 生态'],
};

const medals = ['🥇', '🥈', '🥉'];
  body.innerHTML = data.map((d, i) => {
    const isMe = d.isReal && d.email === currentEmail;
    const rankDisplay = i < 3 ? `<span class="rank-medal">${medals[i]}</span>` : `<span style="color:var(--text2);font-size:14px">${i+1}</span>`;
    const changeHtml = d.change > 0 ? `<span class="change-up">▲ ${d.change}</span>` :
                       d.change < 0 ? `<span class="change-down">▼ ${Math.abs(d.change)}</span>` :
                       `<span class="change-same">— 持平</span>`;
    const color = LEVEL_COLORS[d.tag] || 'var(--blue)';
    const skillBadges = SKILL_BADGES[d.name] || [];
    const badgeHtml = skillBadges.map(b => `<span style="display:inline-block;font-size:10px;padding:1px 6px;border-radius:8px;background:rgba(79,195,247,0.08);border:1px solid rgba(79,195,247,0.15);color:rgba(79,195,247,0.8);margin-left:3px;font-weight:500">${b}</span>`).join('');
    return `
      <div class="lb-row ${isMe ? 'highlight' : ''}">
        <div class="lb-rank">${rankDisplay}</div>
        <div class="lb-member">
          <div class="lb-avatar" style="background:rgba(255,255,255,0.06);border-color:${color}30">${d.avatar}</div>
          <div>
            <div class="lb-name">${d.name} ${isMe ? '（我）' : ''} ${badgeHtml}</div>
            <span class="lb-tag tag-${d.tag}">${TAG_LABELS[d.tag]}</span>
          </div>
        </div>
        <div class="lb-score">${d.score.toLocaleString()}</div>
        <div class="lb-change">${changeHtml}</div>
        <div class="lb-level">
          <div style="font-size:12px;color:var(--text2)">${d.level}</div>
          <div class="level-bar-wrap">
            <div class="level-bar-fill" style="width:${d.levelPct}%;background:${color}"></div>
          </div>
        </div>
      </div>`;
  }).join('');
}

function renderDistChart() {
  const chart = echarts.init(document.getElementById('distChart'), null, { renderer: 'canvas' });
  chart.setOption({
    backgroundColor: 'transparent',
    tooltip: {
      trigger: 'item',
      backgroundColor: 'rgba(7,9,15,0.95)',
      borderColor: 'rgba(255,255,255,0.1)',
      textStyle: { color: '#fff', fontSize: 12 },
      formatter: '{b}: {c}人 ({d}%)'
    },
    series: [{
      type: 'pie', radius: ['40%', '65%'],
      center: ['50%', '50%'],
      label: { show: false },
      emphasis: { label: { show: true, fontSize: 12, color: '#fff' }, itemStyle: { shadowBlur: 16, shadowColor: 'rgba(255,255,255,0.2)' } },
      data: [
        { value: 154, name: '💎 核心节点 (10K+)', itemStyle: { color: '#ffd700' } },
        { value: 564, name: '⭐ 贡献者 (1K-10K)', itemStyle: { color: '#ce93d8' } },
        { value: 987, name: '✈️ 移民 (100-1K)', itemStyle: { color: '#4fc3f7' } },
        { value: 1142, name: '👁️ 观察者 (<100)', itemStyle: { color: 'rgba(255,255,255,0.3)' } },
      ]
    }]
  });
  window.addEventListener('resize', () => chart.resize());
}

function renderTopChart(top10) {
  const el = document.getElementById('topChart');
  if (!el) return;
  if (topChartInstance) {
    topChartInstance.dispose();
  }
  topChartInstance = echarts.init(el, null, { renderer: 'canvas' });
  topChartInstance.setOption({
    backgroundColor: 'transparent',
    tooltip: {
      trigger: 'axis',
      backgroundColor: 'rgba(7,9,15,0.95)',
      borderColor: 'rgba(255,255,255,0.1)',
      textStyle: { color: '#fff', fontSize: 12 },
      axisPointer: { type: 'none' }
    },
    grid: { left: 80, right: 20, top: 10, bottom: 20 },
    xAxis: {
      type: 'value',
      axisLine: { show: false }, axisTick: { show: false },
      splitLine: { lineStyle: { color: 'rgba(255,255,255,0.04)' } },
      axisLabel: { color: 'rgba(255,255,255,0.3)', fontSize: 10, formatter: v => (v/1000).toFixed(0) + 'K' },
    },
    yAxis: {
      type: 'category',
      data: top10.map(d => d.name).reverse(),
      axisLine: { show: false }, axisTick: { show: false },
      axisLabel: { color: 'rgba(255,255,255,0.7)', fontSize: 12 },
    },
    series: [{
      type: 'bar', barMaxWidth: 20,
      data: top10.map((d, i) => ({
        value: d.score,
        itemStyle: {
          color: new echarts.graphic.LinearGradient(1,0,0,0,[
            { offset: 0, color: i < 3 ? '#ffb74d' : '#4fc3f7' },
            { offset: 1, color: i < 3 ? 'rgba(255,183,77,0.15)' : 'rgba(79,195,247,0.15)' }
          ]),
          borderRadius: [0, 6, 6, 0],
        }
      })).reverse(),
      label: { show: true, position: 'right', color: 'rgba(255,255,255,0.5)', fontSize: 11, formatter: p => p.value.toLocaleString() }
    }]
  });
  window.addEventListener('resize', () => { if (topChartInstance) topChartInstance.resize(); });
}

      <button onclick="localStorage.removeItem('dc_current_user');location.reload()" style="padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;background:transparent;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);font-family:inherit;">退出</button>`;
  } else {
    area.innerHTML = `<a href="login.html" style="color:#fff;font-size:14px;font-weight:700;text-decoration:none;background:linear-gradient(135deg,#4fc3f7,#7c4dff);border-radius:8px;padding:7px 20px;">登录</a>`;
  }
})();

// Init
renderMyRank();
renderPodium(allData.slice(0, 3));
renderTable(allData);
renderDistChart();
renderTopChart(allData.slice(0, 10));
</script>
</body>
