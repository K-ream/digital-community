<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>申请内测资格 · 数字移民互助共同体</title>
<style>
  :root {
    --bg: #07090f;
    --bg2: #0d1120;
    --card: rgba(255,255,255,0.05);
    --border: rgba(255,255,255,0.1);
    --border-focus: rgba(79,195,247,0.5);
    --blue: #4fc3f7;
    --green: #81c784;
    --purple: #ce93d8;
    --orange: #ffb74d;
    --text: rgba(255,255,255,0.9);
    --text2: rgba(255,255,255,0.5);
    --error: #ef5350;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
    min-height: 100vh;
  }
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: rgba(7,9,15,0.9);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 40px; height: 60px;
  }
  .nav-logo {
    font-size: 17px; font-weight: 700;
    background: linear-gradient(135deg, #4fc3f7, #ce93d8);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    text-decoration: none;
  }
  .nav-back { color: var(--text2); text-decoration: none; font-size: 14px; transition: color 0.2s; }
  .nav-back:hover { color: var(--blue); }

  .page {
    max-width: 680px; margin: 0 auto;
    padding: 100px 24px 80px;
  }

  /* Header */
  .page-header { text-align: center; margin-bottom: 48px; }
  .page-badge {
    display: inline-block;
    background: rgba(79,195,247,0.12);
    border: 1px solid rgba(79,195,247,0.3);
    border-radius: 20px; padding: 4px 16px;
    font-size: 12px; color: var(--blue); letter-spacing: 2px;
    margin-bottom: 20px;
  }
  .page-header h1 { font-size: 32px; font-weight: 800; margin-bottom: 12px; }
  .page-header p { color: var(--text2); font-size: 15px; line-height: 1.7; }

  /* Form */
  .form-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px;
  }
  .form-group { margin-bottom: 24px; }
  .form-group label {
    display: block; font-size: 14px; font-weight: 600;
    margin-bottom: 8px; color: var(--text);
  }
  .form-group label .required { color: var(--blue); margin-left: 3px; }
  .form-group label .hint { color: var(--text2); font-weight: 400; font-size: 12px; margin-left: 6px; }

  input[type="text"], input[type="email"], select, textarea {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    padding: 12px 16px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    -webkit-appearance: none;
  }
  input[type="text"]:focus, input[type="email"]:focus, select:focus, textarea:focus {
    border-color: var(--border-focus);
    box-shadow: 0 0 0 3px rgba(79,195,247,0.1);
  }
  input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.25); }
  select option { background: #1a1f2e; color: var(--text); }
  textarea { resize: vertical; min-height: 100px; line-height: 1.6; }

  /* Checkbox group */
  .checkbox-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; margin-top: 4px;
  }
  .checkbox-item {
    display: flex; align-items: center; gap: 10px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    border-radius: 8px; padding: 10px 14px;
    cursor: pointer; transition: border-color 0.2s, background 0.2s;
    user-select: none;
  }
  .checkbox-item:hover { border-color: rgba(79,195,247,0.4); }
  .checkbox-item input[type="checkbox"] { display: none; }
  .checkbox-item.checked {
    border-color: rgba(79,195,247,0.6);
    background: rgba(79,195,247,0.08);
  }
  .cb-box {
    width: 18px; height: 18px; border-radius: 4px;
    border: 1.5px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
  }
  .checkbox-item.checked .cb-box {
    background: var(--blue); border-color: var(--blue);
  }
  .cb-check { display: none; font-size: 12px; }
  .checkbox-item.checked .cb-check { display: block; }
  .cb-label { font-size: 14px; }

  /* Range slider */
  .range-wrap { position: relative; }
  input[type="range"] {
    -webkit-appearance: auto;
    width: 100%; height: 4px;
    background: rgba(255,255,255,0.1);
    border: none; border-radius: 2px; padding: 0;
    cursor: pointer; accent-color: var(--blue);
  }
  .range-labels {
    display: flex; justify-content: space-between;
    font-size: 12px; color: var(--text2); margin-top: 8px;
  }
  .range-value {
    text-align: center; font-size: 16px; font-weight: 700;
    color: var(--blue); margin-top: 6px;
  }

  /* Submit */
  .form-divider { border: none; border-top: 1px solid var(--border); margin: 32px 0; }
  .btn-submit {
    width: 100%; padding: 16px;
    background: linear-gradient(135deg, #4fc3f7, #7c4dff);
    color: #fff; font-size: 16px; font-weight: 700;
    border: none; border-radius: 12px; cursor: pointer;
    letter-spacing: 2px; transition: all 0.2s;
    box-shadow: 0 4px 24px rgba(79,195,247,0.3);
  }
  .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(79,195,247,0.45); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  /* Success */
  .success-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(7,9,15,0.95);
    z-index: 200; align-items: center; justify-content: center;
    flex-direction: column; text-align: center; padding: 24px;
  }
  .success-overlay.show { display: flex; }
  .success-icon { font-size: 64px; margin-bottom: 24px; animation: pop 0.5s ease; }
  @keyframes pop { 0%{transform:scale(0)} 80%{transform:scale(1.1)} 100%{transform:scale(1)} }
  .success-overlay h2 { font-size: 28px; margin-bottom: 12px; }
  .success-overlay p { color: var(--text2); font-size: 15px; max-width: 400px; line-height: 1.7; }
  .success-id {
    margin-top: 20px; padding: 12px 24px;
    background: rgba(79,195,247,0.1); border: 1px solid rgba(79,195,247,0.3);
    border-radius: 8px; font-size: 13px; color: var(--blue); font-family: monospace;
  }
  .btn-back-home {
    margin-top: 32px; padding: 12px 32px;
    background: transparent; border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; cursor: pointer;
    font-size: 15px; text-decoration: none;
    display: inline-block; transition: border-color 0.2s, color 0.2s;
  }
  .btn-back-home:hover { border-color: var(--blue); color: var(--blue); }

  @media (max-width: 600px) {
    nav { padding: 0 20px; }
    .form-card { padding: 24px; }
    .checkbox-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">🌐 数字移民共同体</a>
  <a class="nav-back" href="index.html">← 返回首页</a>
</nav>

<div class="page">
  <div class="page-header">
    <div class="page-badge">✦ 内测招募中 ✦</div>
    <h1>申请内测资格</h1>
    <p>我们正在招募第一批数字移民。<br>填写以下信息，共同体会在 3 个工作日内与你联系。</p>
  </div>

  <div class="form-card">
    <form id="applyForm">
      <!-- 姓名/昵称 -->
      <div class="form-group">
        <label>姓名 / 昵称 <span class="required">*</span></label>
        <input type="text" name="name" placeholder="你希望大家怎么称呼你" required>
      </div>

      <!-- 邮箱 -->
      <div class="form-group">
        <label>联系邮箱 <span class="required">*</span></label>
        <input type="email" name="email" placeholder="用于接收内测通知" required>
      </div>

      <!-- 地区 -->
      <div class="form-group">
        <label>所在地区 <span class="required">*</span></label>
        <select name="region" required>
          <option value="" disabled selected>请选择</option>
          <option>中国大陆</option>
          <option>中国香港</option>
          <option>中国台湾</option>
          <option>东南亚</option>
          <option>北美</option>
          <option>欧洲</option>
          <option>其他地区</option>
        </select>
      </div>

      <!-- 数字资产类型 -->
      <div class="form-group">
        <label>拥有的数字资产类型 <span class="required">*</span><span class="hint">可多选</span></label>
        <div class="checkbox-grid" id="assetGrid">
          <div class="checkbox-item" data-value="加密货币">
            <input type="checkbox" name="assets" value="加密货币">
            <div class="cb-box"><span class="cb-check">✓</span></div>
            <span class="cb-label">💰 加密货币</span>
          </div>
          <div class="checkbox-item" data-value="平台积分">
            <input type="checkbox" name="assets" value="平台积分">
            <div class="cb-box"><span class="cb-check">✓</span></div>
            <span class="cb-label">🎯 平台积分</span>
          </div>
          <div class="checkbox-item" data-value="算力资源">
            <input type="checkbox" name="assets" value="算力资源">
            <div class="cb-box"><span class="cb-check">✓</span></div>
            <span class="cb-label">⚙️ 算力资源</span>
          </div>
          <div class="checkbox-item" data-value="版权收益">
            <input type="checkbox" name="assets" value="版权收益">
            <div class="cb-box"><span class="cb-check">✓</span></div>
            <span class="cb-label">📝 版权收益</span>
          </div>
          <div class="checkbox-item" data-value="数字藏品NFT">
            <input type="checkbox" name="assets" value="数字藏品NFT">
            <div class="cb-box"><span class="cb-check">✓</span></div>
            <span class="cb-label">🖼️ 数字藏品/NFT</span>
          </div>
          <div class="checkbox-item" data-value="其他">
            <input type="checkbox" name="assets" value="其他">
            <div class="cb-box"><span class="cb-check">✓</span></div>
            <span class="cb-label">🔮 其他</span>
          </div>
        </div>
      </div>

      <!-- 预计贡献额度 -->
      <div class="form-group">
        <label>预计每月可贡献额度（等值人民币）<span class="required">*</span></label>
        <div class="range-wrap">
          <input type="range" id="contributionRange" min="0" max="4" value="1" step="1">
          <div class="range-labels">
            <span>¥100以下</span>
            <span>¥500</span>
            <span>¥1000</span>
            <span>¥5000</span>
            <span>¥10000+</span>
          </div>
          <div class="range-value" id="rangeDisplay">¥500 / 月</div>
        </div>
        <input type="hidden" name="contribution" id="contributionHidden" value="¥500/月">
      </div>

      <!-- 申请理由 -->
      <div class="form-group">
        <label>申请理由 <span class="required">*</span><span class="hint">100字以内</span></label>
        <textarea name="reason" placeholder="为什么想加入？你希望这个共同体能给你带来什么，或者你能贡献什么？" maxlength="200" required></textarea>
        <div style="text-align:right;font-size:12px;color:var(--text2);margin-top:4px;">
          <span id="charCount">0</span>/200
        </div>
      </div>

      <!-- 渠道来源 -->
      <div class="form-group">
        <label>如何得知我们的</label>
        <select name="source">
          <option value="" disabled selected>请选择（可选）</option>
          <option>朋友推荐</option>
          <option>社交媒体</option>
          <option>搜索引擎</option>
          <option>线下活动</option>
          <option>其他</option>
        </select>
      </div>

      <hr class="form-divider">
      <button type="submit" class="btn-submit" id="submitBtn">提交申请 →</button>
    </form>
  </div>
</div>

<!-- Success Overlay -->
<div class="success-overlay" id="successOverlay">
  <div class="success-icon">🎉</div>
  <h2>申请已提交！</h2>
  <p>感谢你的申请，共同体会在 <strong>3 个工作日</strong>内通过邮件与你联系。<br>保持关注，你即将成为这个世界的一部分。</p>
  <div class="success-id" id="successId">申请编号：DC-2026-XXXXXX</div>
  <a href="index.html" class="btn-back-home">← 返回首页</a>
</div>

<script>
// ── Checkbox toggle ──
document.querySelectorAll('.checkbox-item').forEach(item => {
  item.addEventListener('click', () => {
    const cb = item.querySelector('input[type="checkbox"]');
    cb.checked = !cb.checked;
    item.classList.toggle('checked', cb.checked);
  });
});

// ── Range slider ──
const rangeLabels = ['¥100以下 / 月', '¥500 / 月', '¥1000 / 月', '¥5000 / 月', '¥10000+ / 月'];
const rangeEl = document.getElementById('contributionRange');
const rangeDisplay = document.getElementById('rangeDisplay');
const contributionHidden = document.getElementById('contributionHidden');
rangeEl.addEventListener('input', () => {
  const val = rangeLabels[parseInt(rangeEl.value)];
  rangeDisplay.textContent = val;
  contributionHidden.value = val;
});

// ── Char count ──
const reasonTA = document.querySelector('textarea[name="reason"]');
const charCount = document.getElementById('charCount');
reasonTA.addEventListener('input', () => { charCount.textContent = reasonTA.value.length; });

// ── Form submit → localStorage + show success ──
document.getElementById('applyForm').addEventListener('submit', (e) => {
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '提交中…';

  // Collect assets
  const assets = [...document.querySelectorAll('input[name="assets"]:checked')].map(c => c.value);
  if (assets.length === 0) {
    alert('请至少选择一种数字资产类型');
    btn.disabled = false; btn.textContent = '提交申请 →';
    return;
  }

  const formData = new FormData(e.target);
  const data = {
    id: 'DC-' + Date.now(),
    submitTime: new Date().toLocaleString('zh-CN'),
    name: formData.get('name'),
    email: formData.get('email'),
    region: formData.get('region'),
    assets: assets.join('、'),
    contribution: formData.get('contribution'),
    reason: formData.get('reason'),
    source: formData.get('source') || '未填写',
    status: 'pending', // pending / approved / rejected
  };

  // Save to localStorage
  const existing = JSON.parse(localStorage.getItem('dc_applications') || '[]');
  existing.push(data);
  localStorage.setItem('dc_applications', JSON.stringify(existing));

  // Show success
  setTimeout(() => {
    document.getElementById('successId').textContent = '申请编号：' + data.id;
    document.getElementById('successOverlay').classList.add('show');
  }, 800);
});
</script>
</body>
</html>
