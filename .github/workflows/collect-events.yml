name: 自动采集 AI 大事件

on:
  schedule:
    # 每天 UTC 01:00 和 13:00 执行（北京时间 09:00 和 21:00）
    - cron: '0 1 * * *'
    - cron: '0 13 * * *'
  workflow_dispatch:  # 支持手动触发

jobs:
  collect-events:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 安装依赖
        run: pip install openai requests

      - name: 采集并写入 AI 大事件
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python3 - <<'PYEOF'
          import json, os, sys, hashlib
          from datetime import datetime, timezone, timedelta
          from openai import OpenAI

          client = OpenAI(api_key=os.environ["OPENAI_API_KEY"])

          # ── 读取现有事件 ──
          with open("events.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          existing_events = data.get("events", [])
          existing_titles = {e["title"] for e in existing_events}
          max_id = max((e["id"] for e in existing_events), default=0)

          # ── 现有标题列表（供去重）──
          titles_summary = "\n".join(f"- {t}" for t in sorted(existing_titles))

          # ── 当前时间 ──
          now_sh = datetime.now(timezone(timedelta(hours=8)))
          today_str = now_sh.strftime("%Y年%m月%d日")

          # ── Prompt ──
          system_prompt = """你是一个专业的AI行业分析师。
你的任务是：根据你掌握的知识，整理最近全球人工智能领域发生的重大事件。

输出格式为 JSON 数组，每条事件包含以下字段：
{
  "date": "YYYY-MM-DD",        // 事件发生日期
  "dateDay": "DD",             // 日，两位数字字符串，如 "05"
  "dateMonth": "YYYY年M月",    // 如 "2026年3月"
  "cat": "model|policy|industry|safety|china",  // 分类
  "catLabel": "🧠 模型突破 | 🏛️ 政策法规 | 💼 产业动态 | ⚠️ 安全伦理 | 🌏 中国AI",
  "catClass": "cat-model | cat-policy | cat-industry | cat-safety | cat-china",
  "dotColor": "blue | purple | orange | red | green",  // 对应分类颜色
  "importance": "🔴 极高 | 🟠 高 | 🟡 中",
  "title": "事件标题（20字以内，简洁）",
  "desc": "事件详细描述（80-150字，客观陈述）",
  "impact": "",   // 固定为空字符串
  "impactClass": ""  // 固定为空字符串
}

分类颜色对应关系：
- model → blue
- policy → purple  
- industry → orange
- safety → red
- china → green

重要性标准：
- 🔴 极高：行业里程碑，影响深远（如 GPT-5 发布、重大立法）
- 🟠 高：重要进展，行业广泛关注
- 🟡 中：值得关注的动态

只输出 JSON 数组，不要任何其他文字。"""

          user_prompt = f"""今天是{today_str}。

请整理最近7天内全球AI领域发生的重大事件，提取5-8条最重要的。

以下事件已存在，请勿重复：
{titles_summary}

直接输出 JSON 数组。"""

          print("正在调用 OpenAI API...")
          response = client.chat.completions.create(
              model="gpt-4o",
              messages=[
                  {"role": "system", "content": system_prompt},
                  {"role": "user", "content": user_prompt}
              ],
              temperature=0.3,
              max_tokens=2000,
              response_format={"type": "json_object"}
          )

          raw = response.choices[0].message.content
          print(f"API 返回 {len(raw)} 字符")

          # ── 解析 ──
          parsed = json.loads(raw)
          # 兼容返回 {"events": [...]} 或直接 [...]
          if isinstance(parsed, list):
              new_events = parsed
          elif isinstance(parsed, dict):
              new_events = parsed.get("events", list(parsed.values())[0] if parsed else [])

          print(f"解析到 {len(new_events)} 条候选事件")

          # ── 去重 & 补 ID ──
          added = []
          for e in new_events:
              title = e.get("title", "").strip()
              if not title or title in existing_titles:
                  print(f"  跳过（重复）: {title}")
                  continue
              # 补充 id
              max_id += 1
              e["id"] = max_id
              # 确保 impact 为空
              e["impact"] = ""
              e["impactClass"] = ""
              existing_events.insert(0, e)  # 新事件插到最前
              existing_titles.add(title)
              added.append(title)
              print(f"  新增 ID {max_id}: {title}")

          if not added:
              print("没有新事件，退出")
              sys.exit(0)

          # ── 写回文件 ──
          data["events"] = existing_events
          with open("events.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          print(f"\n共新增 {len(added)} 条事件，已写入 events.json")
          PYEOF

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main
          git add events.json
          git diff --cached --quiet && echo "无新事件，跳过 commit" || \
            git commit -m "🤖 自动采集 AI 大事件 $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')" && \
            git push
